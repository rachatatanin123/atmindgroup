<title>At Mind Group — Review Intelligence</title>
<style>
  :root{
    --ground:#F4F2EC; --surface:#FFFFFF; --surface-2:#FBFAF5; --ink:#16302C;
    --muted:#5E6B66; --faint:#8C968F; --line:#E4DECF; --line-2:#EEE9DD;
    --brand:#1C6E68; --brand-d:#10403C; --brass:#B5852A; --brass-d:#8A6418;
    --pos:#3F8568; --pos-l:#DCEAE1; --neg:#BC5236; --neg-l:#F1DDD4;
    --serif:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;
    --sans:system-ui,-apple-system,"Segoe UI","Leelawadee UI",Tahoma,sans-serif;
    --mono:ui-monospace,"Cascadia Mono",Consolas,monospace;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--sans);
    font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:280px 1fr;min-height:100vh}

  /* sidebar */
  .side{background:var(--brand-d);color:#E8EFEA;padding:26px 20px;position:sticky;top:0;
    height:100vh;overflow-y:auto;border-right:1px solid #0a2c29}
  .brand{font-family:var(--serif);font-size:22px;line-height:1.15;color:#fff;letter-spacing:.2px}
  .brand .sub{display:block;font-family:var(--mono);font-size:10.5px;letter-spacing:2px;
    text-transform:uppercase;color:#8FB7B1;margin-top:8px;font-weight:500}
  .nav-h{font-family:var(--mono);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;
    color:#6FA39C;margin:30px 0 12px}
  .navbtn{display:flex;align-items:center;justify-content:space-between;gap:10px;width:100%;
    text-align:left;background:transparent;border:0;color:#CFE0DB;font-family:var(--sans);
    font-size:14px;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:3px;
    border:1px solid transparent;transition:background .15s,border-color .15s}
  .navbtn:hover{background:#163f3b}
  .navbtn.active{background:#1f5651;border-color:#2c726b;color:#fff}
  .navbtn .sc{font-family:var(--mono);font-size:12.5px;font-weight:600;color:var(--brass);
    background:#0e3531;padding:2px 7px;border-radius:5px}
  .navbtn.active .sc{color:#F0C871}
  .navbtn.compare{background:#11403c;border:1px solid #2c726b;color:#fff;font-weight:600}
  .navbtn.compare.active{background:var(--brass);border-color:var(--brass);color:#241a06}
  .foot{margin-top:28px;font-family:var(--mono);font-size:10px;color:#5d8a84;line-height:1.7;
    border-top:1px solid #134641;padding-top:16px}

  /* main */
  .main{padding:38px 46px 80px;max-width:1180px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:2px;text-transform:uppercase;
    color:var(--brass-d);margin:0 0 8px}
  h1.title{font-family:var(--serif);font-weight:600;font-size:38px;line-height:1.05;margin:0 0 6px}
  .loc{color:var(--muted);font-size:14px;margin-bottom:30px}
  .loc::before{content:"◆ ";color:var(--brass);font-size:9px;vertical-align:middle}

  .sec{margin:42px 0 0}
  .sec-h{display:flex;align-items:baseline;gap:12px;margin:0 0 18px;
    border-bottom:1px solid var(--line);padding-bottom:10px}
  .sec-h .num{font-family:var(--mono);font-size:12px;color:var(--brass-d);font-weight:600}
  .sec-h h2{font-family:var(--serif);font-weight:600;font-size:21px;margin:0}
  .sec-h .hint{font-size:12.5px;color:var(--faint);margin-left:auto}

  .card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:22px 24px}
  .grid{display:grid;gap:18px}

  /* hero scorecard */
  .hero{grid-template-columns:300px 1fr;align-items:stretch}
  .scorebox{background:linear-gradient(160deg,var(--brand-d),var(--brand));color:#fff;
    border-radius:12px;padding:26px;display:flex;flex-direction:column;justify-content:center}
  .scorebox .big{font-family:var(--serif);font-size:74px;line-height:.9;font-weight:600;color:#fff}
  .scorebox .big small{font-size:24px;color:#A9CFC9;font-weight:400}
  .scorebox .verdict{font-size:17px;color:#F0C871;margin-top:8px;font-weight:600}
  .scorebox .nrev{font-family:var(--mono);font-size:12px;color:#A9CFC9;margin-top:14px;letter-spacing:.5px}
  .platrow{display:flex;flex-direction:column;gap:12px;justify-content:center}
  .plat{display:flex;align-items:center;gap:14px}
  .plat .nm{width:92px;font-size:13.5px;color:var(--muted)}
  .plat .track{flex:1;height:10px;background:var(--line-2);border-radius:6px;overflow:hidden}
  .plat .fill{height:100%;background:var(--brand);border-radius:6px}
  .plat .v{font-family:var(--mono);font-size:13px;font-weight:600;width:74px;text-align:right}
  .plat .v small{color:var(--faint);font-weight:400}

  /* distribution stacked bar */
  .distbar{display:flex;height:34px;border-radius:8px;overflow:hidden;border:1px solid var(--line)}
  .distbar span{display:flex;align-items:center;justify-content:center;font-family:var(--mono);
    font-size:11px;color:#fff;min-width:0}
  .distlegend{display:flex;flex-wrap:wrap;gap:16px;margin-top:14px;font-size:12px;color:var(--muted)}
  .distlegend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;
    vertical-align:-1px}

  /* topics diverging */
  .topic{display:grid;grid-template-columns:130px 1fr 1fr;align-items:center;gap:10px;
    padding:7px 0;border-bottom:1px solid var(--line-2)}
  .topic:last-child{border-bottom:0}
  .topic .lab{font-size:13.5px;text-align:right;color:var(--ink)}
  .topic .neg-side{display:flex;justify-content:flex-end;align-items:center;gap:8px}
  .topic .pos-side{display:flex;align-items:center;gap:8px}
  .barneg,.barpos{height:18px;border-radius:4px}
  .barneg{background:var(--neg)}
  .barpos{background:var(--pos)}
  .topic .ct{font-family:var(--mono);font-size:11.5px;color:var(--muted);min-width:30px}
  .topic .ct.n{text-align:left}.topic .ct.p{text-align:right}
  .axis-h{display:grid;grid-template-columns:130px 1fr 1fr;gap:10px;
    font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--faint);margin-bottom:6px}
  .axis-h .r{text-align:right}.axis-h .l{text-align:left}

  /* trend */
  svg.chart{width:100%;height:auto;display:block}
  .chart .grid-l{stroke:var(--line-2);stroke-width:1}
  .chart .axlab{font-family:var(--mono);font-size:10px;fill:var(--faint)}
  .chart .area{fill:rgba(28,110,104,.10)}
  .chart .line{fill:none;stroke:var(--brand);stroke-width:2}
  .chart .dot{fill:var(--brand)}

  /* recommendations */
  .rec{display:grid;grid-template-columns:54px 1fr;gap:18px;padding:20px 0;
    border-bottom:1px solid var(--line)}
  .rec:last-child{border-bottom:0}
  .rec .rn{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--brass);line-height:1}
  .rec h3{font-family:var(--serif);font-size:18px;margin:0 0 4px;font-weight:600}
  .rec .stat{font-family:var(--mono);font-size:12px;color:var(--neg);font-weight:600;margin-bottom:8px}
  .rec p{margin:0 0 10px;color:var(--muted);font-size:14px}
  .rec blockquote{margin:0;padding:10px 14px;background:var(--surface-2);border-left:3px solid var(--neg);
    border-radius:0 7px 7px 0;font-size:13px;color:var(--ink);font-style:italic}
  .rec blockquote+blockquote{margin-top:7px}

  /* compare */
  .rank{display:flex;flex-direction:column;gap:2px}
  .rankrow{display:grid;grid-template-columns:30px 230px 1fr 110px;align-items:center;gap:14px;
    padding:11px 12px;border-radius:9px;cursor:pointer;transition:background .15s}
  .rankrow:hover{background:var(--surface-2)}
  .rankrow .pos{font-family:var(--mono);font-size:13px;color:var(--faint);font-weight:600}
  .rankrow .hn{font-size:14.5px;font-weight:500}
  .rankrow .hn small{display:block;color:var(--faint);font-size:11.5px;font-weight:400}
  .rankrow .track{height:13px;background:var(--line-2);border-radius:7px;overflow:hidden}
  .rankrow .fill{height:100%;background:linear-gradient(90deg,var(--brand),var(--brass));border-radius:7px}
  .rankrow .sc{font-family:var(--mono);font-weight:600;font-size:16px;text-align:right}
  .rankrow .sc small{color:var(--faint);font-size:11px;font-weight:400;display:block}

  table.cmp{width:100%;border-collapse:collapse;font-size:13.5px}
  table.cmp th{font-family:var(--mono);font-size:10.5px;letter-spacing:1px;text-transform:uppercase;
    color:var(--faint);text-align:left;padding:9px 12px;border-bottom:1px solid var(--line)}
  table.cmp td{padding:11px 12px;border-bottom:1px solid var(--line-2);vertical-align:top}
  table.cmp tr:hover td{background:var(--surface-2)}
  table.cmp .hname{font-weight:600;cursor:pointer}
  table.cmp .tag{display:inline-block;font-size:12px;padding:2px 9px;border-radius:20px}
  .tag.up{background:var(--pos-l);color:#2c6149}
  .tag.down{background:var(--neg-l);color:#9a3b22}
  td .scn{font-family:var(--mono);font-weight:600}

  /* platform tabs */
  .ptabs-wrap{margin:34px 0 4px;padding:18px 20px;background:var(--surface-2);
    border:1px solid var(--line);border-radius:12px}
  .ptabs-h{font-family:var(--mono);font-size:10.5px;letter-spacing:1.6px;text-transform:uppercase;
    color:var(--brass-d);margin-bottom:12px}
  .ptabs{display:flex;flex-wrap:wrap;gap:9px}
  .ptab{font-family:var(--sans);font-size:14px;color:var(--muted);background:var(--surface);
    border:1px solid var(--line);border-radius:9px;padding:8px 16px;cursor:pointer;
    display:flex;align-items:center;gap:8px;transition:all .14s}
  .ptab:hover{border-color:var(--brand);color:var(--ink)}
  .ptab small{font-family:var(--mono);font-size:11px;color:var(--faint)}
  .ptab.active{background:var(--brand);border-color:var(--brand);color:#fff;font-weight:600}
  .ptab.active small{color:#A9CFC9}
  .ptabs-ctx{margin-top:13px;font-size:13px;color:var(--muted)}
  .ptabs-ctx b{color:var(--brand);font-weight:600}

  /* trend tooltip */
  .chartwrap{position:relative}
  .tip{position:absolute;pointer-events:none;background:var(--brand-d);color:#fff;
    font-family:var(--mono);font-size:11px;padding:5px 9px;border-radius:6px;
    transform:translate(-50%,calc(-100% - 10px));white-space:nowrap;opacity:0;
    transition:opacity .1s;box-shadow:0 4px 14px rgba(0,0,0,.22)}
  .tip b{color:#F0C871}
  .chart .hov{fill:var(--brass);opacity:0}
  .chart .hovl{stroke:var(--brass);stroke-width:1;stroke-dasharray:3 3;opacity:0}
  .chart .hit{cursor:crosshair}
  .chart .vbar{fill:var(--brass);transition:opacity .08s}
  .subchart{margin-top:22px;padding-top:18px;border-top:1px solid var(--line-2)}
  .subchart-h{font-family:var(--mono);font-size:11px;letter-spacing:1px;text-transform:uppercase;
    color:var(--brass-d);margin-bottom:8px}

  /* topic breakdown cards */
  .tb{border:1px solid var(--line);border-radius:11px;padding:16px 18px;margin-bottom:14px;background:var(--surface)}
  .tb:last-child{margin-bottom:0}
  .tb-h{display:flex;align-items:center;gap:10px;margin-bottom:13px}
  .tb-h h3{font-family:var(--serif);font-size:17px;margin:0;font-weight:600}
  .tb .prio{font-family:var(--mono);font-size:9.5px;letter-spacing:.5px;background:var(--brass);
    color:#241a06;padding:3px 8px;border-radius:5px;font-weight:600}
  .tb-badges{margin-left:auto;display:flex;gap:7px;font-family:var(--mono);font-size:11.5px}
  .tb-badges .b{padding:2px 10px;border-radius:20px;white-space:nowrap}
  .tb-badges .b.p{background:var(--pos-l);color:#2c6149}
  .tb-badges .b.n{background:var(--neg-l);color:#9a3b22}
  .tb-cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .tb-col h4{font-size:11px;margin:0 0 6px;font-family:var(--mono);letter-spacing:1px;text-transform:uppercase}
  .tb-col.pos h4{color:var(--pos)} .tb-col.neg h4{color:var(--neg)}
  .tb-col blockquote{margin:0;font-size:12.5px;color:var(--ink);font-style:italic;line-height:1.55;
    padding-left:11px;border-left:2px solid var(--line)}
  .tb-col.pos blockquote{border-left-color:var(--pos)} .tb-col.neg blockquote{border-left-color:var(--neg)}
  .muted{color:var(--faint);font-size:12.5px}
  .tb-rec{margin-top:13px;padding-top:11px;border-top:1px dashed var(--line);font-size:13.5px;color:var(--muted);line-height:1.6}
  .tb-rec b{color:var(--brass-d)}
  @media(max-width:700px){.tb-cols{grid-template-columns:1fr}}

  .note p{margin:0 0 10px;font-size:13.5px;color:var(--muted);line-height:1.65}
  .note p:last-child{margin-bottom:0}
  .note b{color:var(--ink)}
  .twocol{grid-template-columns:1fr 1fr}
  @media(max-width:900px){
    .app{grid-template-columns:1fr}
    .side{position:relative;height:auto}
    .main{padding:26px 20px 60px}
    .hero,.twocol{grid-template-columns:1fr}
    .rankrow{grid-template-columns:24px 1fr 90px}
    .rankrow .track{display:none}
    h1.title{font-size:30px}
  }
  @media(prefers-reduced-motion:no-preference){
    .view{animation:fade .4s ease both}
    @keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  }
  a:focus-visible,button:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
</style>

<div class="app">
  <aside class="side">
    <div class="brand">At Mind Group<span class="sub">Review Intelligence</span></div>
    <div class="nav-h">มุมมอง</div>

  </aside>
  <main class="main" id="main"></main>
</div>

first serve policy we follow", "pos_sample": "The staff have a five-star service mindset and are very friendly. The room size is large and clean. The refrigerator is big, the amenities are good, and the bedding is nice, making for great sleep. The swimming pool quality is okay, but the fitness center is a bit small, which is disappointing. There’s a convenience store just a 2-minute walk away, and nearby Hollywood Bekadin Pegasus and Seoul Radish Restaurant are a 5-minute walk. The location is great for getting around with Bolt. I want to visit Altera again next time."}, {"topic": "ทำเล", "pos": 992, "neg": 58, "total": 1050, "neg_rate": 0.055, "neg_sample": "No ironing board in rooms and you can request to be provided for short use and to be returned back. Leakage and shower drains blocked in toilet rooms\n“Don’t disturb” hanging signs not available in all rooms so room service disturbance is expected \nWalking 300m to main road is mast to ride any local transportation \nThey only offer 1hrs max late checkout and any later checkout will be charged 500/- batt for every hour", "pos_sample": "The location is great with good accessibility to the city, and the breakfast menu is delicious, perfect for Koreans! The hotel has a swimming pool and gym, so it's wonderful to relax right there! If you're staying in Pattaya, I highly recommend Alte!!"}, {"topic": "พนักงาน/บริการ", "pos": 937, "neg": 110, "total": 1047, "neg_rate": 0.105, "neg_sample": "staff receptionist on dutty  at night she really bad talking too rude", "pos_sample": "I traveled a lot to Thailand when I was single. Now that I have a baby, my perspective on accommodations has changed a bit. The price is not bad at around 80,000 won per night with breakfast included, and the room is a good value for this standard. They provided a baby bed upon request. The hotel is clean and pretty, but the slightly disappointing thing is that the bathroom floor looks a bit old. It seems like it needs thorough cleaning or repairs. Also, the outdoor unit noise and the air conditioning appear a bit outdated. It doesn't feel very clean and there's a lot of humidity. There are smells too. Aside from these three issues, the staff are friendly and it's excellent overall!"}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 796, "neg": 60, "total": 856, "neg_rate": 0.07, "neg_sample": "Room was filthy and required extensive cleaning by me. Gym is minuscule. Staff usually did not make up room until 3 pm or even later.", "pos_sample": "This is a familiar hotel I stay at every time I come to Pattaya. It's spacious, clean, and has a good balance of friendliness and value. The staff always greet you with a smile, and while the breakfast isn’t very extravagant, it’s satisfying. The small but lovely swimming pool and gym, along with the spacious rooms, are great. Having visited Pattaya around ten times and experienced various accommodations, this is one of my favorite hotels that offers good value for money. There must be a reason why many Koreans love it^^ I will relax well again this time."}, {"topic": "ความสะอาด", "pos": 662, "neg": 62, "total": 724, "neg_rate": 0.086, "neg_sample": "Don’t change duvet no bedsheet been changed just quick cleaning and that’s it. You can see the picture. Speak to this lady name oil and she’s not professional", "pos_sample": "The location is very good. It was in the middle of all the hot places like the beach, Terminal 21, and Hollywood Club, and I booked accommodation for my parents and children, reserving a family room, which made it very comfortable. It was convenient to have a washing machine to clean up after water activities. However, the breakfast menu suitable for Koreans was a bit lacking, and the cleanliness was not perfect, which was disappointing. The staff listened to our requests sincerely and well."}, {"topic": "อาหาร/อาหารเช้า", "pos": 385, "neg": 38, "total": 423, "neg_rate": 0.09, "neg_sample": "Buffet breakfast cold. No a la cart. Terrible service.", "pos_sample": "We stayed in a 2-bedroom room for 4 people, and it was convenient to have 2 bathrooms. It was great that we could cook simple meals. All the hotel staff were friendly, and the breakfast suited our taste. There were always shower facilities and towels next to the pool. After checking out of the hotel, we left our luggage at the front desk, wandered around the area, returned to relax by the pool, had a simple dinner at the bar next to the pool, and then headed to the airport. I will use this hotel again next time I visit Pattaya."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 369, "neg": 35, "total": 404, "neg_rate": 0.087, "neg_sample": "No warning of pool maintenance couldn't use the entire stay no offer of drink or dinner pay full price for use of all facilities", "pos_sample": "The Mint and Tom staff always respond kindly with a smile. The pool is nice, and the rooms are worth the price. They do look a bit old, but the rooms are spacious and there is no discomfort during the stay."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 327, "neg": 45, "total": 372, "neg_rate": 0.121, "neg_sample": "water in toilet always overflowing in shower tray", "pos_sample": "The location is great and the staff are very friendly. Whenever there was an issue, Mint and Alex handled it well, so the problem was resolved quickly. They are really nice. The rooms are spacious and comfortable, so I plan to always use this place."}, {"topic": "เสียงรบกวน", "pos": 240, "neg": 20, "total": 260, "neg_rate": 0.077, "neg_sample": "I am uncertain about where to begin. Overall, this was one of the most disappointing experiences I have encountered in a long time, despite my frequent travels and stays in numerous hotels.\n\n* Breakfast: Priced at 200 baht, the selection was extremely limited; I was offered merely two slices of toast, two eggs, and a coffee.\n\n* Condition and cleanliness: The facility was poorly maintained. Although the cleaning staff worked diligently, their attention to detail was lacking.\n\n* Gym and sauna: The gym was inadequately equipped, with minimal facilities for a hotel of this nature, and it was quite small. However, the sauna was commendable.\n\n* Air conditioning: The unit was excessively noisy, and the filter was hanging from the top of the bedroom air conditioning unit.\n\n* Parking facilities: The parking options were very limited.\n\n* Reception staff: The service provided by the reception staff was subpar.\n\n* Wake-up call: I strongly advise against requesting this service. I asked to be awakened at 6 a.m. to catch a flight from Bangkok, but they failed to call me. Fortunately, I woke up at 5:30 a.m. thanks to my mobile alarm. When I approached the reception to express my concern, the staff member merely stated, \"Oh, we did set it for you,\" without offering any apologies or investigating the issue.", "pos_sample": "The staff at the reception is very attentive, the room is spacious, soundproof, and the atmosphere in the bedroom and surroundings is nice. The swimming pool is beautiful, and the accommodation is not far from the beach. If anyone is looking for a place to stay on vacation, I recommend this one!"}, {"topic": "เช็คอิน/รอคิว", "pos": 39, "neg": 23, "total": 62, "neg_rate": 0.371, "neg_sample": "First of all I have make a reservation for 3 person before a month and when during the check in section we need to wait for 20 minutes to let them prepare the extra bed while during check in (they won’t prepare it before you come) , so it should be okay for people who can wait, i making the reservation room for pool view and we are staying 1608 room number but you can’t see the pool from the room , meanwhile I have request with them drinking water cause we book for 2 nights it will be 6 bottle of drinking water, but the reception told us even you book for 7 night we still give you 3 bottle of drinking water,  as my travel experience I feel is quite bad service when I staying in this hotel.  (Honest and objective point of comment as a 00 won per night with breakfast included, and the room is a good value for this standard. They provided a baby bed upon request. The hotel is clean and pretty, but the slightly disappointing thing is that the bathroom floor looks a bit old. It seems like it needs thorough cleaning or repairs. Also, the outdoor unit noise and the air conditioning appear a bit outdated. It doesn't feel very clean and there's a lot of humidity. There are smells too. Aside from these three issues, the staff are friendly and it's excellent overall!"}, {"topic": "ความสะอาด", "pos": 1533, "neg": 149, "total": 1682, "neg_rate": 0.089, "neg_sample": "Don’t change duvet no bedsheet been changed just quick cleaning and that’s it. You can see the picture. Speak to this lady name oil and she’s not professional", "pos_sample": "It didn't take long to get to the bus terminal, and the staff were friendly. \n\nIn particular, a mini staff member kindly helped with the check-in. \n\nThe hotel room was clean, and the staff set up the extra person's bed as soon as we checked in, making for a comfortable stay."}, {"topic": "ทำเล", "pos": 1264, "neg": 90, "total": 1354, "neg_rate": 0.066, "neg_sample": "No ironing board in rooms and you can request to be provided for short use and to be returned back. Leakage and shower drains blocked in toilet rooms\n“Don’t disturb” hanging signs not available in all rooms so room service disturbance is expected \nWalking 300m to main road is mast to ride any local transportation \nThey only offer 1hrs max late checkout and any later checkout will be charged 500/- batt for every hour", "pos_sample": "The location is great with good accessibility to the city, and the breakfast menu is delicious, perfect for Koreans! The hotel has a swimming pool and gym, so it's wonderful to relax right there! If you're staying in Pattaya, I highly recommend Alte!!"}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 993, "neg": 124, "total": 1117, "neg_rate": 0.111, "neg_sample": "I am uncertain about where to begin. Overall, this was one of the most disappointing experiences I have encountered in a long time, despite my frequent travels and stays in numerous hotels.\n\n* Breakfast: Priced at 200 baht, the selection was extremely limited; I was offered merely two slices of toast, two eggs, and a coffee.\n\n* Condition and cleanliness: The facility was poorly maintained. Although the cleaning staff worked diligently, their attention to detail was lacking.\n\n* Gym and sauna: The gym was inadequately equipped, with minimal facilities for a hotel of this nature, and it was quite small. However, the sauna was commendable.\n\n* Air conditioning: The unit was excessively noisy, and the filter was hanging from the top of the bedroom air conditioning unit.\n\n* Parking facilities: The parking options were very limited.\n\n* Reception staff: The service provided by the reception staff was subpar.\n\n* Wake-up call: I strongly advise against requesting this service. I asked to be awakened at 6 a.m. to catch a flight from Bangkok, but they failed to call me. Fortunately, I woke up at 5:30 a.m. thanks to my mobile alarm. When I approached the reception to express my concern, the staff member merely stated, \"Oh, we did set it for you,\" without offering any apologies or investigating the issue.", "pos_sample": "This is a familiar hotel I stay at every time I come to Pattaya. It's spacious, clean, and has a good balance of friendliness and value. The staff always greet you with a smile, and while the breakfast isn’t very extravagant, it’s satisfying. The small but lovely swimming pool and gym, along with the spacious rooms, are great. Having visited Pattaya around ten times and experienced various accommodations, this is one of my favorite hotels that offers good value for money. There must be a reason why many Koreans love it^^ I will relax well again this time."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 925, "neg": 125, "total": 1050, "neg_rate": 0.119, "neg_sample": "Buffet breakfast cold. No a la cart. Terrible service.", "pos_sample": "The Mint and Tom staff always respond kindly with a smile. The pool is nice, and the rooms are worth the price. They do look a bit old, but the rooms are spacious and there is no discomfort during the stay."}, {"topic": "อาหาร/อาหารเช้า", "pos": 530, "neg": 76, "total": 606, "neg_rate": 0.125, "neg_sample": "I found service extremely slow when ordering food & drinks ..", "pos_sample": "We stayed in a 2-bedroom room for 4 people, and it was convenient to have 2 bathrooms. It was great that we could cook simple meals. All the hotel staff were friendly, and the breakfast suited our taste. There were always shower facilities and towels next to the pool. After checking out of the hotel, we left our luggage at the front desk, wandered around the area, returned to relax by the pool, had a simple dinner at the bar next to the pool, and then headed to the airport. I will use this hotel again next time I visit Pattaya."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 434, "neg": 57, "total": 491, "neg_rate": 0.116, "neg_sample": "No warning of pool maintenance couldn't use the entire stay no offer of drink or dinner pay full price for use of all facilities", "pos_sample": "I booked a nearby accommodation to visit Koh Larn in Pattaya, and it was easy to get to the pier. There’s also a convenience store nearby, and it’s convenient to take a Grab to go to the Night Market. The location was excellent. The facilities were cost-effective, and the breakfast was really delicious. The staff were all very friendly. I will definitely come again when I visit Pattaya next time."}, {"topic": "เสียงรบกวน", "pos": 309, "neg": 44, "total": 353, "neg_rate": 0.125, "neg_sample": "Can heard the trollley and staffs talked loudly at the corridor", "pos_sample": "The staff at the reception is very attentive, the room is spacious, soundproof, and the atmosphere in the bedroom and surroundings is nice. The swimming pool is beautiful, and the accommodation is not far from the beach. If anyone is looking for a place to stay on vacation, I recommend this one!"}, {"topic": "เช็คอิน/รอคิว", "pos": 63, "neg": 31, "total": 94, "neg_rate": 0.33, "neg_sample": "First of all I have make a reservation for 3 person before a month and when during the check in section we need to wait for 20 minutes to let them prepare the extra bed while during check in (they won’t prepare it before you come) , so it should be okay for people who can wait, i making the reservation room for pool view and we are staying 1608 room number but you can’t see the pool from the room , meanwhile I have request with them drinking water cause we book for 2 nights it will be 6 bottle of drinking water, but the reception told us even you book for 7 night we still give you 3 bottle of drinking water,  as my travel experience I feel is quite bad service when I staying in this hotel.  (Honest and objective point of comment as a guest)", "pos_sample": "I have finally booked a stay in Pattaya at Altera after a long time. The quick check-in and check-out, as well as the spacious rooms and convenient location, are huge advantages of this hotel. Additionally, the always friendly staff makes it even better, especially I would like to thank Mr. Poisay and Ms. Yoko for their consideration."}], "recs": [{"topic": "ห้องพัก", "pos": 2070, "neg": 255, "total": 2325, "neg_rate": 0.11, "neg_sample": "They only give best room to the travel agent and cant give respect to Agoda customer they give me pool side view I can’t see proper pool view because of initial floor and they said to me sorry all room fully booked only one left I said I booked pool view room before 25 days and staff say first come first serve policy we follow", "pos_sample": "The staff have a five-star service mindset and are very friendly. The room size is large and clean. The refrigerator is big, the amenities are good, and the bedding is nice, making for great sleep. The swimming pool quality is ted one point because the breakfast had very few menu options, only a few items with an average taste. If I come to Pattaya next year, I will book this hotel as my first choice."}, {"topic": "ห้องพัก", "pos": 880, "neg": 34, "total": 914, "neg_rate": 0.037, "neg_sample": "Room service only one men be careful r", "pos_sample": "This accommodation has a convenient location, with friendly service from the staff, clean rooms, and well-equipped amenities, including hot water and good functioning wifi. The breakfast is delicious and there is convenient parking, making it truly worth the money spent."}, {"topic": "ความสะอาด", "pos": 728, "neg": 16, "total": 744, "neg_rate": 0.022, "neg_sample": "Stayed on the 11th floor and could not sleep from outside motor vehicle noise, very very bad. \n\nStayed 5 nights and regret it. \n\nEven when other rooms closed the door is so noisy.\n\nBreakfast looks good but is standard with exception of the menu items.\n\nRoom ok big clean, but not sound proof.\n\nPlace ok, but far from everything.\n\nSwimming pool full of influencers, so you can not use it.\n\nWashing machine sounds good but where to dry in humid weather ? \n\nIf you are a influencer or backpacker looking to pretend this is your place for a few more dollars there are plenty other options", "pos_sample": "We liked this place a lot since we got off the car, with staff opening the door for us 🫶🥰 and helping with our bags. They provided cold water to drink, which was refreshing. It was amazing! When we opened the room, it smelled wonderful. The room itself was clean, the swimming pool had a beautiful view, and everything was perfect. The staff member named Nisa provided excellent service and offered great advice. We will definitely come back to relax here again because we've never experienced such good service before 🫶🙏👏 Everything was impressive. See you again! 🫶"}, {"topic": "อาหาร/อาหารเช้า", "pos": 598, "neg": 30, "total": 628, "neg_rate": 0.048, "neg_sample": "Staff t Breakfast in very attentive", "pos_sample": "I was surprised to receive assistance in Korean from the counter. I forgot the name, but was it Nisa? All the staff are very kind. The person who carried my bags was also very kind, and the rooftop breakfast restaurant was truly a happy experience. The room was clean, and the cleaning was so neat that I didn’t want to leave the hotel. I will definitely come back next time. Thank you so much to everyone."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 578, "neg": 29, "total": 607, "neg_rate": 0.048, "neg_sample": "Pool is closed", "pos_sample": "The room is spacious and clean.  \nYou can do some cooking, and the bathroom has a separate shower and toilet.  \nThere are local restaurants, barbershops, massage places, and a Big C Mart nearby, all easily accessible by songthaew.  \nIt's not in a bustling area but has a good location.  \nThe infinity pool is large, and the bar on the 5th floor is highly recommended for its sunset view!  \nSmoking is allowed on the 1st and 23rd floors, but smoking on the room terrace is prohibited (I booked with the understanding that it was permitted, but it's not).  \nThere might be some concerns about soundproofing.  \nAll the staff are very kind."}, {"topic": "ทำเล", "pos": 373, "neg": 21, "total": 394, "neg_rate": 0.053, "neg_sample": "The rooms are extremely small—so cramped that it feels suffocating, with barely any space to move around or keep your luggage. The location is one of the worst, far from convenience and not easily accessible. On top of that, the property has strange and very restrictive rules, making the stay uncomfortable. Another major issue is their unfair policy—once you book, there is absolutely no cancellation or refund option, even if the hotel does not meet expectations. The Wi-Fi is almost unusable, constantly dropping and painfully slow. Overall, this place feels overpriced for the experience it offers, and I would not recommend it to anyone looking for comfort or convenience.", "pos_sample": "Beautiful hotel!!! Great location! Excellent service!!! Nisa was very kind and helpful. We stayed here twice on the way to and from Koh Larn. All rooms include a washing machine which was great since we were at the beach.  Would love to return!"}, {"topic": "ความคุ้มค่า/ราคา", "pos": 290, "neg": 16, "total": 306, "neg_rate": 0.052, "neg_sample": "Over-priced", "pos_sample": "I was impressed even before getting off the car, waiting with 5-6 people for the valet parking to open the door and take the car to park. The bellboy took all our bags. The welcome drink was so delicious and refreshing. Walking into the hotel, I felt shy as everyone greeted us together. I loved the room so much; the layout was very well done. The room may not be as spacious as a condo, but it had all the necessary equipment and was very convenient to use. I really liked the TV; it was easy to use, and after staying in many places, this is the first one that connected to Wi-Fi easily. I scanned for YouTube, and it worked right away. I loved the bathroom so much! The bed was incredibly soft; my friends all said it felt like it was sucking our souls away, we wanted to sleep more. There was a washing machine and an electric stove as well. I absolutely love it! The rooftop pool has a beautiful view and I took stunning photos there. The fitness center and spa won my heart ❤️. When we arrived at the restaurant, I couldn't help but say, “I don’t know where to compliment because I’m impressed with everything.” The breakfast was served so adorably and appetizing; the portion was just right, allowing us to reorder and try many different dishes. I nearly cried out of joy to have stayed here and to have chosen this place. The staff service was exceptional; I felt uneasy watching the staff kneel to take our orders, but their smiling faces took such good care of us. Oh, I definitely want to come back! I was impressed with everything. Next time, when my body is ready, I will definitely use the swimming pool service. I really want everyone to try staying here. If anyone goes to Pattaya, choose this place for at least one night. The price is just 2 grey cards, and there’s still change! 🥰"}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 271, "neg": 12, "total": 283, "neg_rate": 0.042, "neg_sample": "Subject: Urgent: Complaint Regarding Booking ID Request for Partial Refund\n​Dear Agoda Support Team,\n​I am writing to formally lodge a serious complaint regarding my recent stay at the Abror Hotel, which I booked through your platform. My experience at this property was highly disappointing and fell far below acceptable hospitality standards.\n​I faced several major issues during my stay, which are detailed below:\n​Hygiene and Safety Issue (Lizard in Room): During the night, I discovered a lizard in my room. This was extremely unhygienic and distressing, making it impossible to sleep or feel comfortable.\n​Defective Amenities (AC Not Working): The air conditioning unit in the room was completely non-functional. Staying in a room without proper cooling caused immense discomfort.\n​Downgraded Room Type: Due to the issues mentioned above, the hotel staff eventually changed my room. However, I had originally booked and paid for a large, spacious room, but they shifted me to a much smaller room instead. I did not receive the room category that I actually paid for.\n​Because of these persistent issues, my stay was entirely ruined. The hotel failed to provide the basic amenities and the accommodation standard that was guaranteed at the time of booking.\n​Therefore, I am requesting a refund for at least one night's stay as compensation for the extreme inconvenience and the downgraded room.\n​I am attaching my booking confirmation details for your reference.\n​I expect Agoda to investigate this matter urgently and process my refund at the earliest.\n​Looking forward to your prompt response.\n​Sincerely,\n***\n​\n​", "pos_sample": "The woman named Nisa at the reception had a gre all gift. I will stay here again next time!"}, {"topic": "ห้องพัก", "pos": 1054, "neg": 129, "total": 1183, "neg_rate": 0.109, "neg_sample": "I’ve stayed at this hotel several times over the years and had always considered it one of my favourite places in the area. Unfortunately, this recent visit fell well below expectations. A foul smell coming from the bathroom hit me as soon as I walked in, like stale or stagnant water that hadn’t been addressed.\n\nThe biggest shock came during dinner by the pool when a large rat ran by my table. It was a really unpleasant experience, and hard to ignore. On top of that, I was repeatedly handed leaflets asking for reviews during my stay – which felt more like a push for positive feedback than a genuine interest in guest experience.\n\nI’m really disappointed to say I won’t be returning unless things change. I hope management takes this feedback seriously.", "pos_sample": "Room condition is perfect; I felt comfortable as soon as I checked in. It's nice that the air conditioner is not directed at my head. There is a manual bidet. It's convenient to have a washing machine, induction stove, and sink. The swimming pool is clean, and the staff is friendly. The price is a bit high, but it's worth it."}, {"topic": "ความสะอาด", "pos": 998, "neg": 88, "total": 1086, "neg_rate": 0.081, "neg_sample": "The staff are rude and not welcoming. The room trash bins were left uncleaned and I had to see that and complain", "pos_sample": "The staff were very attentive and provided excellent service. The room was clean and well maintained. Although the facilities are not particularly large, they are well-equipped and enjoyable enough for a comfortable stay."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 519, "neg": 96, "total": 615, "neg_rate": 0.156, "neg_sample": "Room - spacious and comfortable / excellent mirrors - room has a sofa, table and a fridge 👍\n\nFood - 👎 probably the worst pizza I have ever had + breakfast food was very basic. \n\nRoom cleaning - Slow - first time I have stayed at hotel where must wait until 3pm for room cleaning 👎👎\n\nFacilities - Sauna was a nice touch 👍 \n\nSeating area -  Was ok and can sit on sofa by the pool drink/smoke although no fan for evening time mosquitoes. The tables and chairs next to the sofa for eating  are really uncomfortable. \n\nStaff made effort and were friendly \n\nGood location  10 min walk from the beach. \n\n6/10", "pos_sample": "All of the staff were incredibly friendly and provided outstanding service. From check-in to check-out, every aspect of my stay was satisfactory, and the facilities were top-notch. I was able to spend a comfortable and enjoyable time during my stay, and it seems it will remain one of the best memories of this trip. I would like to sincerely thank all the staff, especially Manager Andy. This is a hotel I would like to visit again."}, {"topic": "อาหาร/อาหารเช้า", "pos": 480, "neg": 85, "total": 565, "neg_rate": 0.15, "neg_sample": "Clean and comfortable hotel.  internet Hi speed The refrigerator is very small. The cooking tools are few. You cannot cook what you want. The location is far from everything. There is nothing around you. No restaurants, no 7 elevin or anything. You cannot go anywhere only by taxi. The staff are respectful.", "pos_sample": "The swimming pool was really great for playing in the water rather than just taking pictures. The room was incredibly spacious for the price, and I was very satisfied with the sofa, table, two chairs, and even the bed! I didn't try the breakfast, but the staff were friendly and nice! I especially liked that we could take a free shuttle to Central Festival Pattaya on Beach Road!! We can also go to Terminal 21!"}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 502, "neg": 56, "total": 558, "neg_rate": 0.1, "neg_sample": "Bad attitude of staff.  The water smells like disinfectant!  very disgusting\nAircon sucks.  The washing machine was given but there was no drying function.  Tell you to go to the front and pay for it?", "pos_sample": "This awesome hotel definitely feels like 5 stars and more! The rooms are big, bright, lovely decorated, super clean and the bed is very comfortable. The pool area is beautiful and clean and the breakfast is great.\nWe stayed here for 9 days and enjoyed each day more and more.\nSpecial thanks to Ands and the staff! Always smiling, so very welcoming, genuinely care about the guests with warm attandance and attention to details.\nIt's not our first time in pattaya but definitely the first hotel that made us feel so welcome and comfortable.\nThank you guys, we'll definitely come back ❤️"}, {"topic": "ทำเล", "pos": 447, "neg": 63, "total": 510, "neg_rate": 0.124, "neg_sample": "Not convenient as you need to walk quite a long distant to the beach and shopping centre.", "pos_sample": "The location is a bit ambiguous for walking to anywhere, but being close to a convenience store like Seven Eleven is an advantage. However, due to the hot weather, most people used Grab motorcycles, so the location wasn't a big issue. The basic accommodation had a bathtub, which was really nice. I plan to use it again next time."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 240, "neg": 23, "total": 263, "neg_rate": 0.087, "neg_sample": "I come 13:46 pm they tell me I need wait for 14:00 pm 14 minutes more reception not polite not a welcome to costumer high price  and bad services", "pos_sample": "The room condition is excellent. Even when I requested cleaning late, the staff always smiled and did the cleaning, and other staff members were also friendly. However, the hotel is located inside from a major road, so it can be a bit inconvenient to walk around. You need to use Bolt. There is a shuttle operated by the hotel. It runs at specific times, and you need to reserve it 30 minutes in advance, so it might be good to use that. The pool was clean, but there were many people using it from the morning, making it difficult to find a spot easily. I think the lower price compared to other hotels allows me to tolerate some inconvenience. If I travel to Pattaya again, I will book here again."}, {"topic": "เสียงรบกวน", "pos": 126, "neg": 20, "total": 146, "neg_rate": 0.137, "neg_sample": "I was booking for six night. The room was clean, my room was in the first floor and the next door was a plumbing so I can hear all the electrical noise and the bathroom is smelling very bad of sewer and the toilet", "pos_sample": "The staff are friendly and the room conditions are generally clean. The pool view side is quieter compared to the street view side, but during the day it can be a bit noisy when children are swimming. I didn't request breakfast separately and only used it once, but it was sufficient for a simple meal. There is a 7-Eleven right across from the lobby on the right side, so most necessary items can be found there, and since many bikes and cars pass by, it is advisable to be cautious even though the distance is short. It is a walkable distance to Beach Road, but I recommend taking a taxi. This was my second stay at the hotel, and I was more satisfied compared to my first stay."}, {"topic": "เช็คอิน/รอคิว", "pos": 52, "neg": 26, "total": 78, "neg_rate": 0.333, "neg_sample": "ทัวจีนเยอะ ห้องยังทำความสะอาดไม่เรียบร้อยเลย แต่ให้ลูกค้าเช็คอินได้ยังไง ไฟก็ดับแก้ปัญหาเกือบชั่วโมง", "pos_sample": "Thank you so much for helping my friend's family since he was unable to check in. It was a great help. I will continue to use this hotel in the future."}], "recs": [{"topic": "ห้องพัก", "pos": 1054, "neg": 129, "total": 1183, "neg_rate": 0.109, "neg_sample": "I’ve stayed at this hotel several times over the years and had always considered it one of my favourite places in the area. Unfortunately, this recent visit fell well below expectations. A foul smell coming from the bathroom hit me as soon as I walked in, like stale or stagnant water that hadn’t been addressed.\n\nThe biggest shock came during dinner by the pool when a large rat ran by m ave in the room was very nice. I will definitely use this place again on my next trip to Pattaya."}, {"topic": "ห้องพัก", "pos": 565, "neg": 56, "total": 621, "neg_rate": 0.09, "neg_sample": "Water leaking from air con in the middle of the night. My kids had to watch them fixing while they were very sleepy and crying. I had to ask them to change a new room. Luckily there a room available.", "pos_sample": "The equipment in the room is complete and works well. The food is delicious. The staff provides good service and is very cheerful. There is also free shuttle service. It's great. Highly recommended!"}, {"topic": "ความสะอาด", "pos": 466, "neg": 33, "total": 499, "neg_rate": 0.066, "neg_sample": "The cleanliness was lacking. There is small crocoash appear.", "pos_sample": "​Our stay at Aster Hotel was absolutely amazing! The location is great, and it offers incredible value for money. The rooms are exceptionally clean and spacious, coming equipped with a washing machine and even the option to request cooking tools, which made us feel right at home. The food was fantastic, but what truly made our experience unforgettable was the outstanding staff. Everyone was incredibly welcoming, with a special shoutout to Momo, Patty, and Pukky, who all went above and beyond with their top-tier hospitality. We highly recommend this hotel and will definitely be back!"}, {"topic": "ทำเล", "pos": 341, "neg": 18, "total": 359, "neg_rate": 0.05, "neg_sample": "The room I stayed has not been mopped before I have arrived, when I walked barefeet in the room it was all dust and dirty. The non smoking room I selected still smelled very bad. There is a bad odor in the room and the windows needs to be opened. I covered my nose with an inhaler all night, it was terrible.\n\nThe bed was too soft and there were dust on the last pillows to be seen.\n\nThe furnitures are getting torned away by tourists. They look great in the picture but not in reality.\n\nPaid for two nights but checked out next morning.", "pos_sample": "I stayed for four nights. The location is a bit set back, but with a short walk, you can reach Soi Buakhao, from where you can take a songthaew (15 baht) to Tree Town or the city center, so the location is good. (There is also a convenience store near the hotel.) \nSince my flight was a late-night one, I arrived in Pattaya early in the morning, but I was grateful that they allowed me to check in a little earlier at 12 o'clock. \nThe room was clean, and the bed was a bit on the firm side, but it was very comfortable for me and I slept well. At night, there was no particular noise, and it was quiet. \nIf the opportunity arises, I think I would stay here again."}, {"topic": "อาหาร/อาหารเช้า", "pos": 340, "neg": 19, "total": 359, "neg_rate": 0.053, "neg_sample": "don’t know where to start ... but don’t think I want to stay here again ! \nIf you are looking for a clean room and nice breakfast this is probably not ideal. We stayed here for 6 nights and only good thing is The room is equipped with washing machine BUT there’s nowhere to hang the clothes. Cleaniness of the room needs to be improved ! limited choices for bfast and  we got refused to refill the tea bcoz it is 1 minute past the breakfast time ?!? \nHotel Staffs not very welcoming and friendly unlike other hotels. Would be nice to see more smile and greetings ! About the hotel .... it is about 20 mins walk to the beach and there is a 7-11 about 5 mins walk. Good thing is  it provides free shuttle bus service to central festival and central marina which is just across the beach. If you would like to spend more time at the beach it would be better to stay near the beach instead. The drive for shuttle service is actually helpful and nice although he sounds rude ! Anyway .....Thank you !", "pos_sample": "This is a hotel I have stayed at several times before. Before COVID-19, it was just an ordinary 3.5-star hotel in Pattaya, but I can confidently say that it has made tremendous progress compared to the year before last and last year. They greet customers with the best hospitality service, and it seems that they have put a lot of effort into remodeling the room conditions. The restaurant on the second floor, already famous for its delicious food, is running a 200 baht promotion, so I highly recommend that you go and have a meal there. *** If it becomes available in mid-season, I will not hesitate to make a reservation."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 326, "neg": 25, "total": 351, "neg_rate": 0.071, "neg_sample": "호텔은 깨끗하고 직원들도 친절하다. 침대는 물컹하고 Gym은 너무 작아서 못쓸 수준. 아침에 밥먹으러 내려오면 1층이 하수도 냄새같은 악취로 가득차 있다. 밥은 호텔 수준에 맞는 정도. 나는 맛있게 먹었다. 골목에 차가 많이 다녀서 걸어다니기 위험하다. 원래 호텔이 있기에는 부적당한 위치인 거 같은데 파타야 해변쪽 땅이 부족하고 호텔 수요는 많다보니 이런 곳까지 호텔들을 지어놓은 거 같다. 1박에 3만원 하면 적당할 거 같다.", "pos_sample": "The location of Aster Hotel & Residence is a perfect distance to 3 shopping areas in Pattaya. The room itself is equipped with a kitchenette, which includes an electric stove, microwave, medium sized fridge and a washing machine. The room also offers a balcony for relaxing and a clothes hanger. The staff are amazing and helpful. The facilities could be better and the breakfast does offer a selection of Thai cooked meals, egg station and continental breakfast. \n\nOverall great value for money and also provides shuttle to 3 shopping malls."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 297, "neg": 12, "total": 309, "neg_rate": 0.039, "neg_sample": "This is old furnished hotel. The room was not as good as it was on the commercial. Bed was old and hard. Lobby was small. Frontdesk was not really helpful. When asking for advice about local taxi (thong xieo), she told us to bargain with the driver for the drive (around 200-300THB/3km trip despite the fact that it only cost 10THB/road.  Thailand seems to try its best to cost tourist as much as possible.", "pos_sample": "Very good hotel with new rooms that are not musty.  \nThere is a swimming pool, a restaurant, a washing machine in the room, and a sauna.  \nCheck-in is at 14:00 and check-out is at 12:00.  \nThere is a bathtub for soaking in the Grand deluxe room.  \nThe price for 3 days and 2 nights, including breakfast, was 3300, which is 1650 per day, very worth it. The bed is soft, the pillows are soft, and everything is clean. I was really impressed. The only downside is that it's not a smart TV."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 223, "neg": 24, "total": 247, "neg_rate": 0.097, "neg_sample": "We stayed here for two nights and the photos of the hotel were very different unfortunately. Firstly, the water in the shower kept going from hot to cold, and faucet in the sink sprayed water everywhere. My partner also got bitten by bed bugs in this hotel.", "pos_sample": "This is one of my regular accommodations in Pattaya. The room is clean, the bed is comfortable, and it's spacious enough to spend time comfortably. The staff, including Mui and Patty at the front desk, are always smiling, making me feel like I've returned home."}, {"topic": "เสียงรบกวน", "pos": 95, "neg": 9, "total": 104, "neg_rate": 0.087, "neg_sample": "We recommend facing away from the construction. Intense noise begins early in the morning and lasts all day. Building is not soundproof. Also wrote the following on another review:\n\nMy husband and I stayed here in Pattaya for a few days while we decided where to go next. We are on a 3 month trip and this was our 7th accommodation.\nThe place is an average to underachieving accommodation. There’s nothing intriguing or memorable to write. \nThe entire operation does just enough to get by and don’t expect sincere Thai hospitality. We would not stay here again under similar circumstances.", "pos_sample": "I stayed at the Aster Hotel for 3 nights and I was very satisfied with the cleanliness of the accommodation and the friendliness of the staff. The location was a bit tucked away, but it wasn't too far and it was quiet, which I liked. Thanks to this, I had a comfortable stay and had a great time."}, {"topic": "เช็คอิน/รอคิว", "pos": 39, "neg": 10, "total": 49, "neg_rate": 0.204, "neg_sample": "Ive been visiting lots of hotel due to my business.  and @mind group is my biz partner as well, so whenever i comedown to pattaya, i using @mind (mostly executive hotel im using)  hotel.\n\nthis time, i had invited some of my friends to pattaya and book 5rooms for their overnight staying.\n however our golf was finished quite late so i called to reception and reception lady (Name : K.Nok) answered my phone call with very much impolite manner and was rude, so i told her in the end that \"could you answer to ur customer a little bit kinder than this?\"  her reply was even worse... \"Oh~ we are waiting ok?!\" with very bad tones of voice.\n\nsince its budget hotel, i don't except that much hospitality, however this was way out of it.\n\nand about room.  2 of my my friends complained that too bad food smells in side room when we entered.\n\none was at 5th floor, and the other was 3rd floor.\n\ndefiantly i will re-inform to @main group about her behavior and i wont stay again.", "pos_sample": "The hotel was really lovely. The check in and pool areas were all tiny. But smelled nice and was clean. There wasn't really any effort to decorate in them areas, but the room was really nice. Huge comfortable bed. Nicely decorated. A small kitchen with fridge and washing machine. Had a really nice stay. The staff were all friendly too. About a 15-20 minute walk to the beach front. 130baht in a grab. Koh Larn is nice to visit via ferry. But be aware on Wednesdays they clean the beach so you can't hire sunbeds and shade."}], "recs": [{"topic": "ห้องพัก", "pos": 565, "neg": 56, "total": 621, "neg_rate": 0.09, "neg_sample": "Water leaking from air con in the middle of the night. My kids had to watch them fixing while they were very sleepy and crying. I had to ask them to change a new room. Luckily there a room available.", "pos_sample": "The equipment in the room is complete and I stayed for four nights. The location is a bit set back, but with a short walk, you can reach Soi Buakhao, from where you can take a songthaew (15 baht) to Tree Town or the city center, so the location is good. (There is also a convenience store near the hotel.) \nSince my flight was a late-night one, I arrived in Pattaya early in the morning, but I was grateful that they allowed me to check in a little earlier at 12 o'clock. \nThe room was clean, and the bed was a bit on the firm side, but it was very comfortable for me and I slept well. At night, there was no particular noise, and it was quiet. \nIf the opportunity arises, I think I would stay here again."}, {"topic": "ทำเล", "pos": 586, "neg": 81, "total": 667, "neg_rate": 0.121, "neg_sample": "Location is not good", "pos_sample": "The location of Aster Hotel & Residence is a perfect distance to 3 shopping areas in Pattaya. The room itself is equipped with a kitchenette, which includes an electric stove, microwave, medium sized fridge and a washing machine. The room also offers a balcony for relaxing and a clothes hanger. The staff are amazing and helpful. The facilities could be better and the breakfast does offer a selection of Thai cooked meals, egg station and continental breakfast. \n\nOverall great value for money and also provides shuttle to 3 shopping malls."}, {"topic": "อาหาร/อาหารเช้า", "pos": 594, "neg": 73, "total": 667, "neg_rate": 0.109, "neg_sample": "don’t know where to start ... but don’t think I want to stay here again ! \nIf you are looking for a clean room and nice breakfast this is probably not ideal. We stayed here for 6 nights and only good thing is The room is equipped with washing machine BUT there’s nowhere to hang the clothes. Cleaniness of the room needs to be improved ! limited choices for bfast and  we got refused to refill the tea bcoz it is 1 minute past the breakfast time ?!? \nHotel Staffs not very welcoming and friendly unlike other hotels. Would be nice to see more smile and , but the response from the night shift hotel manager is we turned the water temperature too high.  That is why the yellow water comes out.  Please use common judgment to determine whether her claim is valid.  Does the water temperature has been set by the hotel?  We felt that the staffs are not professional in greeting guests, no \"hi\" no \"thank you\" , no \"apologies \"or any welcome feedback from most of the hotel staffs, especially the worst from the front desk on the day shift.  We were the one to say hi, thank you to them.", "pos_sample": "I rested comfortably for three days. All the staff were kind, and even though there were difficulties with the language, they tried to respond to all requests. The pool is small but conveniently located on the second floor, and since there weren't many users, I could enjoy it comfortably. The breakfast was good as it was during a promotion period, allowing me to have a nice meal for 200 baht. There are three convenience stores nearby, which is great for buying snacks, and having a washing machine and microwave in the room was very nice. I will definitely use this place again on my next trip to Pattaya."}, {"topic": "ความสะอาด", "pos": 1292, "neg": 89, "total": 1381, "neg_rate": 0.064, "neg_sample": "The room I stayed has not been mopped before I have arrived, when I walked barefeet in the room it was all dust and dirty. The non smoking room I selected still smelled very bad. There is a bad odor in the room and the windows needs to be opened. I covered my nose with an inhaler all night, it was terrible.\n\nThe bed was too soft and there were dust on the last pillows to be seen.\n\nThe furnitures are getting torned away by tourists. They look great in the picture but not in reality.\n\nPaid for two nights but checked out next morning.", "pos_sample": "​Our stay at Aster Hotel was absolutely amazing! The location is great, and it offers incredible value for money. The rooms are exceptionally clean and spacious, coming equippe ": 9.56, "n": 57}, {"ym": "2026-05", "avg": 9.54, "n": 48}, {"ym": "2026-06", "avg": 9.25, "n": 37}], "topics": [{"topic": "พนักงาน/บริการ", "pos": 834, "neg": 37, "total": 871, "neg_rate": 0.042, "neg_sample": "So I have had a less than satisfactory stay. Last night a hotel worker attempted to enter our room \"to give us water\" at 3 am, without knocking. We complained to the front desk but no action seems to have been taken or acknowledgement that this was extremely inappropriate and potentially illegal. Not to mention roosters start crowing at 4 am and don't stop until later in the day. Would not recommend.", "pos_sample": "It is a very nice hotel. The hotel is not very big, but the atmosphere is luxurious from the moment you enter. The room is comfortable, the bed is soft, it is clean, the bathroom is good, and it has a view of the swimming pool. The food is delicious and plentiful, and the welcome drink is excellent. The staff takes very good care of you. Khun Kee came to introduce himself and helped carry the bags, and all the other staff members were very nice. They were helpful throughout the stay, even when I lost my key card. The bathroom on the first floor is also very good, but the entrance is in a rather small alley, and there is parking available."}, {"topic": "ห้องพัก", "pos": 632, "neg": 40, "total": 672, "neg_rate": 0.06, "neg_sample": "Rooms very small. Paid more for room w sofa bed, got smallest room anyway and no sofa bed. Gym so small you can’t move. No closets or storage drawers.", "pos_sample": "It is a reasonably priced hotel. The breakfast is very good, delicious, and varied. The beds are comfortable and clean, with all amenities provided. Most importantly, all the staff are very service-minded, cheerful, and friendly, especially Kee/Ice/Dear/Bell and Tom. I will definitely come back to stay again."}, {"topic": "ทำเล", "pos": 627, "neg": 18, "total": 645, "neg_rate": 0.028, "neg_sample": "Too far from the beach. Very small pool.", "pos_sample": "The location is particularly good. You can walk to the terminal nearby. There are many bars in the vicinity, and it's close to various night markets. The design is especially beautiful. Thank you very much to FIFA for the reception, fluent Chinese throughout, and his English is on point. I will definitely visit again; the air conditioning in the room is particularly cool, much better than other hotels. Thank you very much, FIFA."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 516, "neg": 19, "total": 535, "neg_rate": 0.036, "neg_sample": "Having booked a summer holiday it was so disappointing that after day 2 they decide to refurbish the pool this was really inconvenient, the substitute was a 15 minutes drive to another hotel to use theirs, this was a real sour note of the trip", "pos_sample": "The Amban Hotel in Pattaya is conveniently located about a 5-minute walk from Tree Town, making it easy to find dining and shopping options. With Bolt, you can travel comfortably anywhere, and you can wait at the entrance with peace of mind. The staff is friendly, and returning to the hotel brings a sense of calm. \n\nThe facilities, including a pool, gym, and bar, are excellent, and there's also a coin laundry nearby, making it perfect for long stays. The shower in the room is comfortable, daily bed-making is provided, and a safety box is available, allowing for a worry-free stay. I think this service at such a price is fantastic. \n\nWhen I visit Pattaya again, I will definitely want to stay at the Amban Hotel. Thank you very much."}, {"topic": "ความสะอาด", "pos": 451, "neg": 24, "total": 475, "neg_rate": 0.051, "neg_sample": "an additional extra cleaning of my bed sheet got charged in an very expensive extra fee.", "pos_sample": "Perfect stay at Hotel Amber Pattaya! The hotel is in an excellent location, surroundings are nice and peaceful. Rooms are spotlessly clean, well arranged and really comfortable.\n\nSpecial thanks to front desk staff Mr.Fifa, he provided super warm ixed\n- Frequent WIFI dropouts\n\nWould I stay here again? No.", "pos_sample": "This is my second stay. This time I stayed for three nights and had a comfortable experience. The hotel is located in a lively area, just a short walk from Tree Town, but it was quiet at night and I slept soundly. It looks like it will become my regular accommodation when I come to Pattaya."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 244, "neg": 10, "total": 254, "neg_rate": 0.039, "neg_sample": "This hotel is overpriced", "pos_sample": "It's a bit far to walk to the beach or Second Road in hot weather, but the room condition and amenities are good for the price. The staff is friendly, and especially the male concierge at the entrance is very kind. I was touched to see the KEE staff greet every customer with a bright smile. I know that this kind of service is a very difficult task that not just anyone can do. I've stayed at several hotels, but the level of kindness here is the best. 👍"}, {"topic": "เสียงรบกวน", "pos": 240, "neg": 6, "total": 246, "neg_rate": 0.024, "neg_sample": "Shocking in every aspect.the Hotel did not reply a single Email.they ignore their guests.umfriendly.impertinent.incompetent.much much more mosquitos then in any other Hotels.loud.not possible to sleep.i did go to the reception every day and even translated for them and kindly asked to reply the emails.they never did.its a shame.this Hotel is a nightmare.", "pos_sample": "I used the hotel in the first week of May. The hotel is located near Soi Buakhao, but the surrounding area is very quiet, providing a calm environment. The attached pool and sauna were also very nice, allowing me to relax. What left a particularly strong impression was the service provided by \"Mr. BELL,\" who guided me. During a sudden downpour when it was difficult to catch a Grab taxi, he quickly arranged a taxi using the Bolt app, enabling me to get to the airport bus on time. I was really grateful for his help. Thank you very much! I would recommend this hotel to Japanese customers as well. I would like to use it again when I come to Pattaya!"}, {"topic": "เช็คอิน/รอคิว", "pos": 36, "neg": 8, "total": 44, "neg_rate": 0.182, "neg_sample": "Once we check in we were move since the first room with disgusting so was second one which supposed to upgrade room. We left to hilton instead.", "pos_sample": "Although it is slightly located in an alley, it is within a 10-minute walk to Central Pattaya, and the hotel provides free shuttles to Central Pattaya and Terminal 21, making it very convenient. The room was spacious and clean, and the bed was very comfortable. It had a balcony, which was good for ventilation and drying laundry. The hotel staff was very friendly, and with the complimentary welcome tea voucher given at check-in, I could enjoy a beer by the pool, and the breakfast was at a satisfactory level. There was quite a bit of noise from the entertainment area until dawn, but it wasn't uncomfortable for sleeping. Overall, it was a very satisfying hotel for the price, and I would want to return if I visit Pattaya again."}], "recs": [{"topic": "ห้องพัก", "pos": 632, "neg": 40, "total": 672, "neg_rate": 0.06, "neg_sample": "Rooms very small. Paid more for room w sofa bed, got smallest room anyway and no sofa bed. Gym so small you can’t move. No closets or storage drawers.", "pos_sample": "It is a reasonably priced hotel. The breakfast is very good, delicious, and varied. The beds are comfortable and clean, with all amenities provided. Most importantly, all the staff are very service-minded, cheerful, and friendly, especially Kee/Ice/Dear/Bell and Tom. I will definitely come back to stay again."}, {"topic": "พนักงาน/บริการ", "pos": 834, "neg": 37, "total": 871, "neg_rate": 0.042, "neg_sample": "So I have had a less than satisfactory stay. Last night a hotel worker attempted to enter our room \"to give us water\" at 3 am, without knocking. We complained to the front desk but no action seems to have been taken or ol area is in the shade for the rest of the time, and although this may be ideal for some travellers who just want to chill out without catching any UV rays, for me, this was far from ideal. The pool itself was also in the shade all day, long resulting in some very chilly temperatures which would take your breath away and resulted in most residents avoiding a dip in the facilities. Therefore, I would say to any potential visitors to bear this in mind as although the facilities are lovely, they are not designed for sun worshippers.\n\nMy only other comments are, there are some issues with tiny insects in the rooms around the tea stations, and how odd it is to have the bathroom sink in the main bedroom area – not ideal!", "pos_sample": "Very nice pool.\nStaff were friendly and attentive.\nDecent variety at buffet breakfast.\n\nGreat location. Can Walk to everywhere.\n\nNo red flags at all\n\nOnly small nitpick if I had to say something and its not too bad.  You had to request to clean you room. It wasn't automatically cleaned.\n\nWould stay again in a heartbeat."}, {"topic": "ความสะอาด", "pos": 786, "neg": 5, "total": 791, "neg_rate": 0.006, "neg_sample": "First room very dirty with water leak.  We changed rooms.  Ok after that", "pos_sample": "Room is clean and bed very comfy"}, {"topic": "ห้องพัก", "pos": 336, "neg": 14, "total": 350, "neg_rate": 0.04, "neg_sample": "There was  a lot of many tiny insect  in my room  so l was unpleasent", "pos_sample": "I was already a couple of times at the Amber Hotel in Pattaya, and I always love to return. A very friendly atmosphere, a very clean hotel, a nice pool area, and super friendly staff. The rooms are clean and usually pretty quiet at night. However, you are very fast at Soi Bukhao at Pattaya, which is just a couple of steps away. Highly recommend that place."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 276, "neg": 1, "total": 277, "neg_rate": 0.004, "neg_sample": "I have stayed at this hotel often so obviously my experience overall is a good one and much of that is owing to the staff who are by and large very helpful and attentive.  However I would advise ownership to invest in maintaining the property so that it does not fall into disrepair because the signs of wear and tear are evident throughout.  Most distressing in my particular case was a leaky air conditioning unit which despite the staff, housekeeping, and technicians' best efforts, could not be fixed despite no less than five attempts to do so.  It's not a reach to assume that I am not the first guest to experience said leaking air conditioner in that room.   If that is indeed the case then my conclusion is that ownership would rather have guests deal with the inconvenience and put the burden on management and staff to deal with it rather than simply investing in replacing the unit.  These kinds of issues can accumulate quickly and result in loss of reputation which, once gone, is difficult to regain.", "pos_sample": "lovely room and very comfortable bed. Book a pool facing room, you will thank me later. One side of the hotel faces Treetown and it's too loud at night plus there's a rooster that likes 430 am wakeup. pool view removes any of that."}, {"topic": "ทำเล", "pos": 98, "neg": 5, "total": 103, "neg_rate": 0.049, "neg_sample": "Upon departure employees put me in a taxi going to the wrong bus station (airport bus instead of north Pataya for Exkimai): whole stay nearly ruined because of their sloppiness. Also hotel shuttle is kept a secret. Bbc/cnn poor reception on cable set up. And the street and dining options like a visit to hell. Some employees very nice however.", "pos_sample": "Nice hotel in a great location. A lot of things to do during daytime and night within walking distance.  We enjoyed daily breakfast options and sipping coffee overlooking the pool. Gym is tiny and saunas did not work, so if you like to workout daily be prepared for another plan."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 91, "neg": 5, "total": 96, "neg_rate": 0.052, "neg_sample": "Stayed at Amber for the first time. The rooms where a bit to small for me tbh but staff is nice and location is great. Nice pool area but not wow food. I will think about staying here again.", "pos_sample": "The pool is nice and the restaurant has good Thai and western options. I will definitely stay here again."}, {"topic": "อาหาร/อาหารเช้า", "pos": 77, "neg": 6, "total": 83, "neg_rate": 0.072, "neg_sample": "Buffet breakfast was quite adequate but some of the hot food wasn't hot. Coffee was good. \n\nWalls a bit thin as i could hear the couple next-door arguing!\n\nStaff were friendly.", "pos_sample": "Fantastisk hotel i midten af Pattaya. Alt perfekt, god restaurant hvor alt er lækkert og super morgenmad. Specielt Kee gjorde en ihærdig indsats for at opholdet blev mindeværdigt. Tusind tak"}, {"topic": "เสียงรบกวน", "pos": 36, "neg": 4, "total": 40, "neg_rate": 0.1, "neg_sample": "I thought I booked front beach room. Lucky that stuff let me see the front beach room first which it will cost more$$$. However I couldn’t see the beach with the front beach view. A cross from hotel is bar.. it played very loud music and it opened very late at night. Breakfast is very good. I love that.", "pos_sample": "2026年6月に宿泊。比較的最近オープンしたホテルなので、全てが綺麗です。エントランスに到着と同時に笑顔でお出迎え、フロントスタッフもフレンドリーで、とても好印象でした。ソイブッカオ通りまで3分程度、ブッカオ通りにはソウテウが相互に走っているのでどこへ行くのにも便利です。またブッカオ通りから少し離れているので夜間の喧騒も無縁の静かな環境です。プールは二段式で、それほど大きくはありません。唯一気になったのが、プールサイドのベットが少な目で、朝一でバスタオルでキープされたベットは夕方まで空きません。\n朝食は食べてないので分かりません。\n部屋はとでも清潔で綺麗で、しっかりとした歯ブラシがありました。シャワーの出も良く、リネン類も清潔で問題ありません。\n今回、エアコンのトラブルで部屋を移りましたが、スムーズな手配で、アップグレードもしていただき感謝です。\nこのホテルには、1人だけ日本語が少し話せるスタッフBELL君がおり、日本人の私にとても親近感を持って接してくれ、彼のお陰で安心して過ごす事が出来ました。感謝です。またOHさんという女性スタッフもとてもフレンドリーで安心でき、滞在の助けとなりました。\n私の泊まった時の客層は1番多かってのがロシア人、つぎにインド人、韓国人、中国人でした。たまたまかもしれませんが、皆さんマナーよく、特に気になる事はありませんでした。バスが入れない立地なので団体客を受けていないというレポートがありましたが、その通りでした。\n次回パタヤに行った際も是非リピートしたいな！と思わせる良いホテルでした。\n\nI stayed here in June 2026. Since it's a relatively recently opened hotel, everything is very clean. I was greeted with smiles upon arrival at the entrance, and the front desk staff were friendly, leaving a very positive impression. It's about a 3-minute walk to Soi Buakhao, and since songthaews (shared taxis) run back and forth on Buakhao, it's convenient for getting anywhere. Also, because it's slightly set back from Buakhao, it's a quiet environment, free from the nighttime hustle and bustle. The pool is two-tiered and not particularly large. The only thing I noticed was that there were few poolside beds; those reserved with towels in the morning remained vacant until the evening.\nI didn't have breakfast, so I can't comment on that.\nThe room was very clean and tidy, and there was a good quality toothbrush. The sho"}, {"topic": "ความคุ้มค่า/ราคา", "pos": 30, "neg": 3, "total": 33, "neg_rate": 0.091, "neg_sample": "GREAT VALUE and certainly a 4 star hotel for this town. Must be careful on Main Street due to fast moving traffic. Not exactly family friendly. I Will continue to go there.", "pos_sample": "The staff at this hotel were fantastic. Specifically, Kee. She was very professional and accommodating.  The room was phenomenal. Very clean with a great view of the pool. Overall, my experience was excellent. This hotels in a Primary location and the price is very affordable."}, {"topic": "เช็คอิน/รอคิว", "pos": 4, "neg": 1, "total": 5, "neg_rate": 0.2, "neg_sample": null, "pos_sample": "Right in the heart of everything but still really nice and quiet, lovely pool area, super comfortable bed. The staff were exceptional from check in and reception thru to the lovely ladies who cleaned our room. Would highly recommend"}], "recs": [{"topic": "ห้องพัก", "pos": 336, "neg": 14, "total": 350, "neg_rate": 0.04, "neg_sample": "There was  a lot of many tiny insect  in my room  so l was unpleasent", "pos_sample": "I was already a couple of times at the Amber Hotel in Pattaya, and I always love to return. A very friendly atmosphere, a very
