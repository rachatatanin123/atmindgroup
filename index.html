icious and plentiful, and the welcome drink is excellent. The staff takes very good care of you. Khun Kee came to introduce himself and helped carry the bags, and all the other staff members were very nice. They were helpful throughout the stay, even when I lost my key card. The bathroom on the first floor is also very good, but the entrance is in a rather small alley, and there is parking available."}, {"topic": "ห้องพัก", "pos": 1408, "neg": 247, "total": 1655, "neg_rate": 0.149, "neg_sample": "This hotel is located in a street full of girly bars, and lots of them use the hotel, due to the high number of single men staying.\n\nThe food is pretty awful and does not look like the pictures on the menu.\n\nThe pool is hard to access, with no hand rails.\n\nRooms are small, no wardrobe, just 5 hangers and 1 small drawer.", "pos_sample": "It is a reasonably priced hotel. The breakfast is very good, delicious, and varied. The beds are comfortable and clean, with all amenities provided. Most importantly, all the staff are very service-minded, cheerful, and friendly, especially Kee/Ice/Dear/Bell and Tom. I will definitely come back to stay again."}, {"topic": "ทำเล", "pos": 1294, "neg": 75, "total": 1369, "neg_rate": 0.055, "neg_sample": "Too far from the beach. Very small pool.", "pos_sample": "The location is particularly good. You can walk to the terminal nearby. There are many bars in the vicinity, and it's close to various night markets. The design is especially beautiful. Thank you very much to FIFA for the reception, fluent Chinese throughout, and his English is on point. I will definitely visit again; the air conditioning in the room is particularly cool, much better than other hotels. Thank you very much, FIFA."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 975, "neg": 252, "total": 1227, "neg_rate": 0.205, "neg_sample": "Having booked a summer holiday it was so disappointing that after day 2 they decide to refurbish the pool this was really inconvenient, the substitute was a 15 minutes drive to another hotel to use theirs, this was a real sour note of the trip", "pos_sample": "The Amban Hotel in Pattaya is conveniently located about a 5-minute walk from Tree Town, making it easy to find dining and shopping options. With Bolt, you can travel comfortably anywhere, and you can wait at the entrance with peace of mind. The staff is friendly, and returning to the hotel brings a sense of calm. \n\nThe facilities, including a pool, gym, and bar, are excellent, and there's also a coin laundry nearby, making it perfect for long stays. The shower in the room is comfortable, daily bed-making is provided, and a safety box is available, allowing for a worry-free stay. I think this service at such a price is fantastic. \n\nWhen I visit Pattaya again, I will definitely want to stay at the Amban Hotel. Thank you very much."}, {"topic": "อาหาร/อาหารเช้า", "pos": 804, "neg": 94, "total": 898, "neg_rate": 0.105, "neg_sample": "Stayed in July for a week long business trip. Upkeep of guestroom is fair, friendly staff  at the reception. \nDecent breakfast offerings, and loved the fish porridge.", "pos_sample": "We had a wonderful time here because the staff's attitude was excellent, everyone was friendly and greeted us warmly, making us feel at home! Although the hotel is not large, it has everything you need. There are various welcome drink options, convenient shuttle bus reservations, a swimming pool, a gym, and a rich and diverse breakfast. The location is excellent, quiet yet close to the hustle and bustle. Highly recommended!"}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 750, "neg": 71, "total": 821, "neg_rate": 0.086, "neg_sample": "I booked this hotel based on the 4+ star reviews. I don't understand how this hotel rates as 4+ star. At best, it's a 2 star.\n\nBooked a queen room with pool view.  The room itself was half decent.\n\nPros:\n\n- Fairly spacious room for solo traveller\n- The water pressure in the shower is good\n- Queen bed is comfortable\n\nCons:\n- I booked a Grab motorbike taxi, and when he came to pick me up, he and I got mouthed off by the official motorbike taxi drivers just outside the hotel - they said motorbike Grab taxis can't enter beyond the hotel road entrance\n- Room service is virtually non-existent, I had to eventually contact Agoda and request they speak with the hotel to get them to make up my room\n- The phone in the room wasn't working, I reported it several times but it never got fixed\n- Frequent WIFI dropouts\n\nWould I stay here again? No.", "pos_sample": "This is my second stay. This time I stayed for three nights and had a comfortable experience. The hotel is located in a lively area, just a short walk from Tree Town, but it was quiet at night and I slept soundly. It looks like it will become my regular accommodation when I come to Pattaya."}, {"topic": "เสียงรบกวน", "pos": 401, "neg": 65, "total": 466, "neg_rate": 0.139, "neg_sample": "Shocking in every aspect.the Hotel did not reply a single Email.they ignore their guests.umfriendly.impertinent.incompetent.much much more mosquitos then in any other Hotels.loud.not possible to sleep.i did go to the reception every day and even translated for them and kindly asked to reply the emails.they never did.its a shame.this Hotel is a nightmare.", "pos_sample": "I used the hotel in the first week of May. The hotel is located near Soi Buakhao, but the surrounding area is very quiet, providing a calm environment. The attached pool and sauna were also very nice, allowing me to relax. What left a particularly strong impression was the service provided by \"Mr. BELL,\" who guided me. During a sudden downpour when it was difficult to catch a Grab taxi, he quickly arranged a taxi using the Bolt app, enabling me to get to the airport bus on time. I was really grateful for his help. Thank you very much! I would recommend this hotel to Japanese customers as well. I would like to use it again when I come to Pattaya!"}, {"topic": "ความคุ้มค่า/ราคา", "pos": 372, "neg": 60, "total": 432, "neg_rate": 0.139, "neg_sample": "This hotel is overpriced", "pos_sample": "It's a bit far to walk to the beach or Second Road in hot weather, but the room condition and amenities are good for the price. The staff is friendly, and especially the male concierge at the entrance is very kind. I was touched to see the KEE staff greet every customer with a bright smile. I know that this kind of service is a very difficult task that not just anyone can do. I've stayed at several hotels, but the level of kindness here is the best. 👍"}, {"topic": "เช็คอิน/รอคิว", "pos": 59, "neg": 24, "total": 83, "neg_rate": 0.289, "neg_sample": "Once we check in we were move since the first room with disgusting so was second one which supposed to upgrade room. We left to hilton instead.", "pos_sample": "Perfect stay at Hotel Amber Pattaya! The hotel is in an excellent location, surroundings are nice and peaceful. Rooms are spotlessly clean, well arranged and really comfortable.\n\nSpecial thanks to front desk staff Mr.Fifa, he provided super warm and thoughtful service during my check-in. He is patient and helpful all the time.\n\nAll staff are polite, overall experience is amazing. Great value for money, will definitely come back and highly recommend to everyone."}], "recs": [{"topic": "สิ่งอำนวยความสะดวก", "pos": 975, "neg": 252, "total": 1227, "neg_rate": 0.205, "neg_sample": "Having booked a summer holiday it was so disappointing that after day 2 they decide to refurbish the pool this was really inconvenient, the substitute was a 15 minutes drive to another hotel to use theirs, this was a real sour note of the trip", "pos_sample": "The Amban Hotel in Pattaya is conveniently located about a 5-minute walk from Tree Town, making it easy to find dining and shopping options. With Bolt, you can travel comfortably anywhere, and you can wait at the entrance with peace of mind. The staff is friendly, and returning to the hotel brings a sense of calm. , "avg": 9.6, "n": 20}, {"ym": "2025-10", "avg": 9.46, "n": 14}, {"ym": "2025-11", "avg": 9.03, "n": 14}, {"ym": "2025-12", "avg": 9.32, "n": 23}, {"ym": "2026-01", "avg": 9.48, "n": 13}, {"ym": "2026-02", "avg": 8.84, "n": 10}, {"ym": "2026-03", "avg": 9.18, "n": 17}, {"ym": "2026-04", "avg": 9.31, "n": 11}, {"ym": "2026-05", "avg": 8.3, "n": 8}, {"ym": "2026-06", "avg": 9.52, "n": 10}], "topics": [{"topic": "ห้องพัก", "pos": 863, "neg": 195, "total": 1058, "neg_rate": 0.184, "neg_sample": "Review Summary: I am a very frequent Traveller with +100 Nights per year in this Hotel, I left my Running Gear to dry on the Balcony, checked out and forgot to take it. Called same Day, all gear could not be found! Please make sure you not forget anything in that Hotel.  Also no Offer for Compensation of any kind. Nevertheless I will stay in this Hotel as the Rest is good for me.", "pos_sample": "One of the best hotels I stayed in Bangkok! Spacious rooms, very clean, high quality amenities, towels etc. Delicious breakfast until 12pm (that’s rare!) Close to BTS, easy to access, the area is very convenient. And the sweetest staff! Immediate reaction on all requests, very helpful. Will definitely stay again!"}, {"topic": "ทำเล", "pos": 928, "neg": 116, "total": 1044, "neg_rate": 0.111, "neg_sample": "Rooms are dirty and noisy and nobody cares there, the location is not so bad any way you can find better options in\nThe area for the same money", "pos_sample": "The service from the staff is very good. The accommodation is convenient and close to all amenities. I recommend staying here; you won't be disappointed for sure."}, {"topic": "พนักงาน/บริการ", "pos": 740, "neg": 143, "total": 883, "neg_rate": 0.162, "neg_sample": "We forgot our valuable item upon checkout and called the hotel later that evening to check for us. The receptionist told us to \"call back in 5 mins\".  And of course they never found it.  We insisted them to double check because we were certain we left it there. This time I also left my phone number to call me back. Of course nobody ever called.", "pos_sample": "This accommodation is not bad for those who are somewhat familiar with Thailand's geography and find public transportation easy to use. It has more advantages than disadvantages. However, the drawbacks are disappointing. The pool is small, and the fitness facilities are either broken or cramped. The convenience store is only 300 meters away, which could be a downside if you need laundry services. There are many advantages, though. The staff are very friendly, and the beds are incredibly comfortable. Most importantly, it has a balcony, which I personally enjoyed very much. The supermarket and BTS station are not far, and there are also delicious restaurants and bakeries nearby. It's not bad for solo or couple travelers. I recommend it."}, {"topic": "ความสะอาด", "pos": 646, "neg": 106, "total": 752, "neg_rate": 0.141, "neg_sample": "There was coffee stain on sheets that I did cause. Staff had not attempted to wash and staff was aggressive. We are willing to pay as needed, and did not like how we were approached.", "pos_sample": "The accommodation here meets the needs for cleanliness and is equipped with complete amenities. It is close to shopping areas, making travel and relaxation convenient."}, {"topic": "อาหาร/อาหารเช้า", "pos": 506, "neg": 62, "total": 568, "neg_rate": 0.109, "neg_sample": "If you need to wake up for an early flight .... Make sure you give them a written note ... And maybe you'll be lucky enough to get that important call ... If not get ready to purchase a new flight ✈️ ticket !!! Breakfast is ok for the price !!! Staff friendly and will go out of there way to help you !!! I hope you enjoy your stay there ... Regards", "pos_sample": "I think this is one of the best value hotel in BKK and breakfast is great too.    Some room may have WIFI issue  though"}, {"topic": "ความคุ้มค่า/ราคา", "pos": 420, "neg": 66, "total": 486, "neg_rate": 0.136, "neg_sample": "Walk about 10 from BTS.\nPrice compared location is not worthy", "pos_sample": "The hotel is excellent and has amazing value for money. The staff are incredibly helpful and friendly. The hotel is about 5-8 minutes from the BTS, and there are convenience stores and restaurants close by. There's also a coin laundry right across the street. The breakfast and the staff at breakfast are great. The gym is good, and the sauna is good too. The hotel has a bit of ware (it's not a luxury hotel), but everything else is fantastic. Undoubtedly would stay again!"}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 331, "neg": 76, "total": 407, "neg_rate": 0.187, "neg_sample": "Almost of the room's condition was not so good\nSofa and bathroom was not that clean\nAnd little bit old\nThe best point this hotel has is that they have small swimming pool, gym, and sauna. That's all.\nMost of people who clean the rooms are kind they greet kindly\nBut who sits 1 floor infront of desk doesnt smile and gives service unhappily. It also makes another person who is next to him uncomfortable. (the man with glasses)", "pos_sample": "They should not advertise they have a pool; it is under repair.  Everything else was great.  KV Mansion is a better deal if you don't care if there is a doorman."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 303, "neg": 81, "total": 384, "neg_rate": 0.211, "neg_sample": "So disappointed when we go back to the room at night, no warm water to shower only have boiled water or cold water. \n water heater got problem I complained several times but did not take the initiative to change rooms. The water heater only provides super boiling water and cold water and no so-called warm water. The floor is dirty but the room is clean", "pos_sample": "Our family had an absolutely wonderful stay at Amber Hotel, and I can honestly say it exceeded all of our expectations. From the moment we arrived, everything felt comfortable, warm, and well-organized, making it a perfect place for a family to relax. What impressed us the most was the breakfast quality — it was truly outstanding. The variety, freshness, and taste were far beyond what we expected, and every morning felt like a special treat. It was easily one of the best hotel breakfasts we have experienced, and our whole family looked forward to it every day. The rooms were clean, spacious, and very comfortable, allowing all of us to rest well after a long day. The staff were kind, attentive, and always ready to help, which made our stay even more pleasant. Overall, our family satisfaction was at the highest level, and Amber Hotel has become one of our favorite places to stay. We would happily return and highly recommend it to anyone, especially families looking for a comfortable and high-quality hotel experience."}, {"topic": "เสียงรบกวน", "pos": 162, "neg": 42, "total": 204, "neg_rate": 0.206, "neg_sample": "Requested quiet room on our booking confirmation \nOur room was on 7th floor, facing the road so can hear noise! \nWorst of all there’s a school directly opposite our room and every morning at 7ish - 8am, the school students and teachers sings, dance performing and loud music speaker!!\nWe could not sleep in it has caused lots of disturbance! \nFeedback to the staff, they pretended they do not know \nWith our feedback they did not immediately move us to another room. \nRoom is very dusty, has bad smell and has insets, stains on sofa! Bad water drainage in shower and basin! Shower water pressure is very small! Temperature not consistent!! Poor glass door, water will wet the floor area!\nWill not recommend!!", "pos_sample": "We had a wonderful stay at this hotel. The rooms were clean, spacious, and very comfortable, especially the beds, making it easy to relax after a long day. The staff provided excellent service and were always friendly, attentive, and helpful. The hotel’s location was very convenient, just less than 5mins walk from BTS On Nut. Breakfast was delicious, with a good variety of fresh options to start the day. The only downside was that the soundproofing could be improved. But overall, it was a very pleasant experience and we would highly recommend this hotel."}, {"topic": "เช็คอิน/รอคิว", "pos": 42, "neg": 20, "total": 62, "neg_rate": 0.323, "neg_sample": "There was a mistake that had happened which should not occur. In the very early morning, a maid nocks our room while we still sleep on the bed and then uses her key card to try to open our room. I wonder how this could happen, she replied, thinking that we already checked out. This is shown as unprofessional in the process of checking in or out, which needs to be changed.", "pos_sample": "Location is not far from airport. Took a metered taxi from airport and reached Hotel Amber in 55 mins. A Hotel staff was already waiting outside the main entrance to help unload our baggages. Check in was fast. Room is exactly per the photo I saw when I booked the room. Spacious and clean. King size comfortable bed for a couple.  Cleaning staff placed a basket of daily essentials outside our door even when we placed a Dont Disturb signage when we were out. This is my first encounter. \n\nGreat practice.  Room service meal menu has wide food choices reasonably priced.  \n\nHotel location is about 10 mins walk to On Nut BTS station.  2 foot,shoulder,neck and full body massage shops just 2 mins walk away from hotel. Hotel is also very quiet and peaceful. Room rate is very reasonably priced.\n\nHotel Amber staff are very pleasant and friendly.  Will certainly be back for more stays in the near future."}], "recs": [{"topic": "ห้องพัก", "pos": 863, "neg": 195, "total": 1058, "neg_rate": 0.184, "neg_sample": "Review Summary: I am a very frequent Traveller with +100 Nights per year in this Hotel, I left my Running Gear to dry on the Balcony, checked out and forgot to take it. Called same Day, all gear could not be found! Please make sure you not forget anything in that Hotel.  Also no Offer for Compensation of any kin kly. \n\nThank you.", "pos_sample": "What I loved:\n\nSmooth Check-in: I arrived from the airport feeling unwell, and the staff was incredibly kind. They made sure I was okay, stored my luggage securely with tags, and gave me great recommendations while waiting for my room. When I returned from my walk, the room was already ready.\n\nThe Room: It was much larger than expected! Very clean, with beautiful colors. The bed was exceptionally comfortable—I slept so well.\n\nAmenities: I appreciated the welcome drink, the mini-fridge, and the three free bottles of water provided daily to stay hydrated. The bathroom had everything needed, including clear instructions for the hot water pressure and laundry service. Having a phone to reach the front desk was very convenient.\n\nBirthday Surprise: Since it was my birthday trip, the staff surprised me with a small cake to blow out my candle when I returned in the evening. It was such a thoughtful touch!\n\nSafety & Communication: I felt very safe. The entire staff speaks English, so communication was very fluid.\n\nLocation: Perfect! It's in a quiet street, yet only 5 minutes from the BTS (skytrain), a food court, a night market, and a cinema.\n\nHonesty regarding renovations: The street and the pool were under renovation, but I actually see this as a positive point. It shows the hotel is well-maintained. Most importantly, they are very transparent: they sent a message right after booking to inform me and apologized again at check-in. I really appreciated that honesty."}], "recs": [{"topic": "ห้องพัก", "pos": 259, "neg": 108, "total": 367, "neg_rate": 0.294, "neg_sample": "-ท่อในห้องน้ำมีกลิ่น\n-พื้นห้องบางส่วนบวม\n-ปลั๊กหัวเตียงชาร์จไม่ได้ หลวม\n-วิวห้อง ไม่ดี อยู่ติดกับอาคารสีเหลือง\n-ทีวี สัญญาณไม่ดี ภาพสะดุด\n-สระว่ายน้ำเล็ก\n-ห้องยิมเล็ก อุปกรณ์ออกกำลังกายน้อย\n-ลิฟต์บางทีมีกลิ่น", "pos_sample": "เตียงนอน หมอน ผ้าห่ม คือนุ่มมากกกกกกก เป็นการนอนที่สบายที่สุด หลับแบบเต็มอิ่มเลย ห้องสวย สะอาดมาก ห่างจาก Bts อ่อนนุชไม่ไกล แบบเ f! Immediate reaction on all requests, very helpful. Will definitely stay again!"}, {"topic": "ทำเล", "pos": 1430, "neg": 174, "total": 1604, "neg_rate": 0.108, "neg_sample": "Rooms are dirty and noisy and nobody cares there, the location is not so bad any way you can find better options in\nThe area for the same money", "pos_sample": "The service from the staff is very good. The accommodation is convenient and close to all amenities. I recommend staying here; you won't be disappointed for sure."}, {"topic": "พนักงาน/บริการ", "pos": 1364, "neg": 237, "total": 1601, "neg_rate": 0.148, "neg_sample": "We forgot our valuable item upon checkout and called the hotel later that evening to check for us. The receptionist told us to \"call back in 5 mins\".  And of course they never found it.  We insisted them to double check because we were certain we left it there. This time I also left my phone number to call me back. Of course nobody ever called.", "pos_sample": "This accommodation is not bad for those who are somewhat familiar with Thailand's geography and find public transportation easy to use. It has more advantages than disadvantages. However, the drawbacks are disappointing. The pool is small, and the fitness facilities are either broken or cramped. The convenience store is only 300 meters away, which could be a downside if you need laundry services. There are many advantages, though. The staff are very friendly, and the beds are incredibly comfortable. Most importantly, it has a balcony, which I personally enjoyed very much. The supermarket and BTS station are not far, and there are also delicious restaurants and bakeries nearby. It's not bad for solo or couple travelers. I recommend it."}, {"topic": "ความสะอาด", "pos": 1004, "neg": 180, "total": 1184, "neg_rate": 0.152, "neg_sample": "There was coffee stain on sheets that I did cause. Staff had not attempted to wash and staff was aggressive. We are willing to pay as needed, and did not like how we were approached.", "pos_sample": "The accommodation here meets the needs for cleanliness and is equipped with complete amenities. It is close to shopping areas, making travel and relaxation convenient."}, {"topic": "อาหาร/อาหารเช้า", "pos": 895, "neg": 122, "total": 1017, "neg_rate": 0.12, "neg_sample": "If you need to wake up for an early flight .... Make sure you give them a written note ... And maybe you'll be lucky enough to get that important call ... If not get ready to purchase a new flight ✈️ ticket !!! Breakfast is ok for the price !!! Staff friendly and will go out of there way to help you !!! I hope you enjoy your stay there ... Regards", "pos_sample": "I think this is one of the best value hotel in BKK and breakfast is great too.    Some room may have WIFI issue  though"}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 581, "neg": 178, "total": 759, "neg_rate": 0.235, "neg_sample": "So disappointed when we go back to the room at night, no warm water to shower only have boiled water or cold water. \n water heater got problem I complained several times but did not take the initiative to change rooms. The water heater only provides super boiling water and cold water and no so-called warm water. The floor is dirty but the room is clean", "pos_sample": "Our family had an absolutely wonderful stay at Amber Hotel, and I can honestly say it exceeded all of our expectations. From the moment we arrived, everything felt comfortable, warm, and well-organized, making it a perfect place for a family to relax. What impressed us the most was the breakfast quality — it was truly outstanding. The variety, freshness, and taste were far beyond what we expected, and every morning felt like a special treat. It was easily one of the best hotel breakfasts we have experienced, and our whole family looked forward to it every day. The rooms were clean, spacious, and very comfortable, allowing all of us to rest well after a long day. The staff were kind, attentive, and always ready to help, which made our stay even more pleasant. Overall, our family satisfaction was at the highest level, and Amber Hotel has become one of our favorite places to stay. We would happily return and highly recommend it to anyone, especially families looking for a comfortable and high-quality hotel experience."}, {"topic": "สิ่งอำนวยความสะดวก", "pos": 524, "neg": 197, "total": 721, "neg_rate": 0.273, "neg_sample": "Almost of the room's condition was not so good\nSofa and bathroom was not that clean\nAnd little bit old\nThe best point this hotel has is that they have small swimming pool, gym, and sauna. That's all.\nMost of people who clean the rooms are kind they greet kindly\nBut who sits 1 floor infront of desk doesnt smile and gives service unhappily. It also makes another person who is next to him uncomfortable. (the man with glasses)", "pos_sample": "They should not advertise they have a pool; it is under repair.  Everything else was great.  KV Mansion is a better deal if you don't care if there is a doorman."}, {"topic": "ความคุ้มค่า/ราคา", "pos": 589, "neg": 110, "total": 699, "neg_rate": 0.157, "neg_sample": "Walk about 10 from BTS.\nPrice compared location is not worthy", "pos_sample": "The hotel is excellent and has amazing value for money. The staff are incredibly helpful and friendly. The hotel is about 5-8 minutes from the BTS, and there are convenience stores and restaurants close by. There's also a coin laundry right across the street. The breakfast and the staff at breakfast are great. The gym is good, and the sauna is good too. The hotel has a bit of ware (it's not a luxury hotel), but everything else is fantastic. Undoubtedly would stay again!"}, {"topic": "เสียงรบกวน", "pos": 268, "neg": 81, "total": 349, "neg_rate": 0.232, "neg_sample": "Requested quiet room on our booking confirmation \nOur room was on 7th floor, facing the road so can hear noise! \nWorst of all there’s a school directly opposite our room and every morning at 7ish - 8am, the school students and teachers ude and unhelpful  the breakfast at this hotel is no good but then what do you expect for 150bht? The pool is small but in the photos looks big. There is a gym next to the pool, The hotel rooms are okay but nothing special no cupboard to hang your clothes, poor wifi There is no western restaurants close by, main road is dusty because of a major construction goin on  not far from the hotel. I will be leaving sooner than what I planned, There is no refunds.", "pos_sample": "The room was very clean and the bedding was also tidy, allowing for a comfortable stay. Staff member Puyfai was very kind and attentive, making the experience pleasant from check-in to check-out. The hotel location was great, making it convenient to move around the area, and the breakfast was varied and delicious. Overall, it was a highly satisfactory accommodation, and I would like to visit this hotel again next time."}, {"topic": "ความสบาย/แอร์/น้ำ", "pos": 209, "neg": 18, "total": 227, "neg_rate": 0.079, "neg_sample": "Worst hotel experience I’ve had worldwide!\n\nI’ve stayed at hotels across many countries, and this was by far the worst and most inhumane experience. I disliked it so much that I checked out early.\n\n1. Misleading star rating\n\nDo not trust the four-star rating. This property is realistically closer to a two-star hotel. At this rate in Pattaya you could get a nice high rise condo or a nicer hotel.\n\n2. Impossible to sleep\n\nA hotel’s primary purpose is to provide rest. This hotel sits between two very noisy streets with extremely poor sound insulation. Light sleepers will struggle to sleep. Importantly, the listing does not disclose the noise issue. This matters to me because I’m recovering from a sickness and needed rest.\n\n3. Dishonest management & poor handling of complaints\n\nAfter being shocked by the noise level, I requested an early checkout and partial refund. The manager redirected me to Agoda. Agoda later negotiated a two-night refund. When I showed the confirmati  streets with extremely poor sound insulation. Light sleepers will struggle to sleep. Importantly, the listing does not disclose the noise issue. This matters to me because I’m recovering from a sickness and needed rest.\n\n3. Dishonest management & poor handling of complaints\n\nAfter being shocked by the noise level, I requested an early checkout and partial refund. The manager redirected me to Agoda. Agoda later negotiated a two-night refund. When I showed the confirmation email at the front desk, the front desk staff (a girl who spoke Chinese and Thai) mocked the email and denied the arrangement. Only after insisting did the manager acknowledge it. Communication was also difficult due to poor English, and my request to use a translator was not honored until I insisted.\n\n4. Lack of privacy\nThe room directly faces nearby residential balconies. Residents could easily see into the room, which felt uncomfortable and intrusive.\n\n5. Lack of empathy\nDespite being visibly unwell and packing to leave, the manager rushed me to check out and poorly communicated deadlines, even threatening cancellation of the refund over a brief delay. This added unnecessary stress while I was sick.\n\nOverall\nMisleading rating, severe noise problems, poor soundproofing, lack of privacy, and unprofessional management. I would not recommend this hotel.", "pos_sample": "I usually stay around Beach Road or near Central Pattaya for convenience, but this hotel offered significantly better value for money. The room rates are much lower than many hotels in the tourist areas, yet the rooms are more spacious, well-maintained, and comfortable.\n\nOne of the highlights for me was the breakfast. Instead of including it with the room booking, I recommend booking the room online and purchasing the breakfast coupon directly from reception for 140 THB on the days you actually want breakfast. It gives you the flexibility to explore local breakfast spots or enjoy a lazy morning without feeling like you've already paid for a meal you're not having. The breakfast itself is excellent for the price, with a good variety of options and a wonderful egg station. The dining staff were always friendly and attentive.\n\nThe property is quite large, consisting of four buildings, and offers plenty of facilities including a swimming pool, a small but decent gym, a spa, laundry service, and even a mini supermarket. I also have to mention the beautiful scent throughout the reception area—it creates a very welcoming first impression every time you walk in.\n\nThe rooms are spacious and thoughtfully equipped with two air conditioners, which makes a huge difference during Pattaya's hot weather. Housekeeping did a great job keeping everything clean and well maintained throughout my stay.\n\nThe reception team was helpful and professional. One thing to note is that there aren't many staff members available to assist with luggage, so don't expect full bell service.\n\nWhile the hotel isn't located directly in the beach area, I found the location very manageable. It's only about a 5-minute ride to the beach and around 10 minutes to Terminal 21. There's also a large 7-Eleven just a 2-minute walk away, which is incredibly convenient.\n\nOverall, The Grass Serviced Suites by At Mind exceeded my expectations. If you're looking for a spacious, comfortable, and affordable stay in Pattaya with excellent breakfast options and good facilities, this hotel is definitely worth considering."}, {"topic": "ห้องพัก", "pos": 1476, "neg": 256, "total": 1732, "neg_rate": 0.148, "neg_sample": "Room open needs special help...\nNoisy at night\nCan't open windows surrounded building\nCigarette smell near room and outside chairs...\n3 nights booking, but I spend only 1 night and move to other hotel without any refund.\nLooks like cheap motel or lodges...", "pos_sample": "The room was very clean and the bedding was also tidy, allowing for a comfortable stay. Staff member Beer was very kind and attentive, makin const H = DATA.hotels.slice().sort((a,b)=>b.avg-a.avg);

const fmt = n => n.toLocaleString('en-US');
const verdict = v => v>=9?'ยอดเยี่ยม':v>=8.5?'ดีมาก':v>=8?'ดี':v>=7?'ค่อนข้างดี':'พอใช้';
const loc = name => /sukhumvit|bangkok|กรุงเทพ/i.test(name)?'กรุงเทพฯ · สุขุมวิท':'พัทยา · ชลบุรี';
const shortName = name => name.replace(/^Hotel\s+/,'').replace(/\s+(Hotel and Residence|and Residence|Pattaya).*$/i,'').trim()||name;
const DIST_ORDER=[['9-10','#3F8568','ประทับใจมาก'],['8-9','#7CA98C','ดี'],['6-8','#D9B24A','ปานกลาง'],['4-6','#D98A4A','ต้องปรับปรุง'],['0-4','#BC5236','แย่']];

// pick top strength (high pos, low neg_rate, decent volume) & weakness
function strengthOf(h){
  const c=h.topics.filter(t=>t.total>=20).slice().sort((a,b)=>(a.neg_rate-b.neg_rate)||(b.pos-a.pos));
  return c[0];
}
function weaknessOf(h){ return h.recs[0]; }

/* ---------- charts ---------- */
function distBar(dist){
  const tot=DIST_ORDER.reduce((s,[k])=>s+(dist[k]||0),0)||1;
  let html='<div class="distbar">';
  DIST_ORDER.forEach(([k,c])=>{const n=dist[k]||0;const w=n/tot*100;
    if(w>0)html+=`<span style="width:${w}%;background:${c}">${w>7?Math.round(w)+'%':''}</span>`;});
  html+='</div><div class="distlegend">';
  DIST_ORDER.forEach(([k,c,lab])=>{const n=dist[k]||0;
    html+=`<span><i style="background:${c}"></i>${lab} <b>${fmt(n)}</b></span>`;});
  return html+'</div>';
}

function topicsBars(topics){
  const top=topics.slice(0,8);
  const maxPos=Math.max(...top.map(t=>t.pos),1);
  const maxNeg=Math.max(...top.map(t=>t.neg),1);
  let html=`<div class="axis-h"><div></div><div class="r">◀ พูดถึงในแง่ลบ</div><div class="l">พูดถึงในแง่ดี ▶</div></div>`;
  top.forEach(t=>{
    const pw=t.pos/maxPos*100, nw=t.neg/maxNeg*100;
    html+=`<div class="topic"><div class="lab">${t.topic}</div>
      <div class="neg-side"><span class="ct n">${t.neg}</span><div class="barneg" style="width:${nw}%"></div></div>
      <div class="pos-side"><div class="barpos" style="width:${pw}%"></div><span class="ct p">${t.pos}</span></div></div>`;
  });
  return html;
}

const TG={W:760,Hh:240,padl:34,padr:14,padt:14,padb:24,ymin:6,ymax:10};
let CURTREND=null, CURHOTEL=null, CURPLAT='all';
function tgX(i,n){return TG.padl+(i/(n-1))*(TG.W-TG.padl-TG.padr);}
function tgY(v){const ih=TG.Hh-TG.padt-TG.padb;
  return TG.padt+(1-(Math.max(TG.ymin,Math.min(TG.ymax,v))-TG.ymin)/(TG.ymax-TG.ymin))*ih;}

function trendChart(trend){
  if(trend.length<2) return '<p style="color:var(--faint)">ข้อมูลไม่พอแสดงแนวโน้ม</p>';
  const n=trend.length, {W,Hh,padl,padr,padt,padb}=TG;
  let grid='',ax='';
  for(let g=TG.ymin;g<=TG.ymax;g++){const yy=tgY(g);
    grid+=`<line class="grid-l" x1="${padl}" y1="${yy}" x2="${W-padr}" y2="${yy}"/>`;
    ax+=`<text class="axlab" x="${padl-6}" y="${yy+3}" text-anchor="end">${g}</text>`;}
  let lastYr='';
  trend.forEach((p,i)=>{const yr=p.ym.slice(0,4);if(yr!==lastYr){lastYr=yr;
    ax+=`<text class="axlab" x="${tgX(i,n)}" y="${Hh-6}" text-anchor="middle">${yr}</text>`;}});
  const pts=trend.map((p,i)=>`${tgX(i,n)},${tgY(p.avg)}`).join(' ');
  const area=`${padl},${tgY(TG.ymin)} ${pts} ${tgX(n-1,n)},${tgY(TG.ymin)}`;
  const last=trend[n-1];
  return `<div class="chartwrap" id="cw">
    <svg class="chart" id="trendsvg" viewBox="0 0 ${W} ${Hh}" role="img" aria-label="แนวโน้มคะแนนเฉลี่ยรายเดือน">
    ${grid}<polygon class="area" points="${area}"/><polyline class="line" points="${pts}"/>
    <circle class="dot" cx="${tgX(n-1,n)}" cy="${tgY(last.avg)}" r="3.5"/>${ax}
    <line class="hovl" id="hovl" x1="0" y1="${padt}" x2="0" y2="${Hh-padb}"/>
    <circle class="hov" id="hov" r="4.5"/>
    <rect class="hit" id="hit" x="${padl}" y="${padt}" width="${W-padl-padr}" height="${Hh-padt-padb}" fill="transparent"/></svg>
    <div class="tip" id="tip"></div></div>
    <p style="font-size:12.5px;color:var(--faint);margin:6px 0 0">เลื่อนเมาส์บนกราฟเพื่อดูตัวเลขรายเดือน · เฉพาะเดือนที่มี ≥3 รีวิว · ล่าสุด ${last.ym} = <b style="color:var(--brand)">${last.avg}</b></p>`;
}

function initTrend(){
  const svg=document.getElementById('trendsvg'); if(!svg||!CURTREND) return;
  const trend=CURTREND, n=trend.length;
  const tip=document.getElementById('tip'), hov=document.getElementById('hov'),
        hovl=document.getElementById('hovl'), wrap=document.getElementById('cw');
  function move(e){
    const r=svg.getBoundingClientRect();
    const sx=(e.clientX-r.left)*(TG.W/r.width);
    let i=Math.round((sx-TG.padl)/((TG.W-TG.padl-TG.padr))*(n-1));
    i=Math.max(0,Math.min(n-1,i)); const p=trend[i];
    const px=tgX(i,n), py=tgY(p.avg);
    hov.setAttribute('cx',px); hov.setAttribute('cy',py); hov.style.opacity=1;
    hovl.setAttribute('x1',px); hovl.setAttribute('x2',px); hovl.style.opacity=1;
    tip.innerHTML=`${p.ym} · <b>${p.avg.toFixed(2)}</b> · ${fmt(p.n)} รีวิว`;
    tip.style.left=(px/TG.W*r.width)+'px';
    tip.style.top=(py/TG.Hh*r.height)+'px';
    tip.style.opacity=1;
  }
  function leave(){tip.style.opacity=0;hov.style.opacity=0;hovl.style.opacity=0;}
  wrap.addEventListener('mousemove',move);
  wrap.addEventListener('mouseleave',leave);
}

const VH=170;            // volume chart height (shares TG x-geometry)
function volumeChart(trend){
  if(trend.length<2) return '';
  const n=trend.length, {W,padl,padr,padt,padb}=TG;
  const ih=VH-padt-padb;
  const maxN=Math.max(...trend.map(p=>p.n),1);
  const bw=Math.max(1.5,(W-padl-padr)/n*0.7);
  const vy=c=>padt+(1-c/maxN)*ih;
  let grid='',ax='',bars='';
  [0,Math.round(maxN/2),maxN].forEach(g=>{const yy=vy(g);
    grid+=`<line class="grid-l" x1="${padl}" y1="${yy}" x2="${W-padr}" y2="${yy}"/>`;
    ax+=`<text class="axlab" x="${padl-6}" y="${yy+3}" text-anchor="end">${g}</text>`;});
  let lastYr='';
  trend.forEach((p,i)=>{const yr=p.ym.slice(0,4);if(yr!==lastYr){lastYr=yr;
    ax+=`<text class="axlab" x="${tgX(i,n)}" y="${VH-6}" text-anchor="middle">${yr}</text>`;}});
  trend.forEach((p,i)=>{const yy=vy(p.n);
    bars+=`<rect class="vbar" x="${tgX(i,n)-bw/2}" y="${yy}" width="${bw}" height="${(padt+ih)-yy}"/>`;});
  const tot=trend.reduce((s,p)=>s+p.n,0);
  return `<div class="chartwrap" id="vw">
    <svg class="chart" id="volsvg" viewBox="0 0 ${W} ${VH}" role="img" aria-label="จำนวนรีวิวต่อเดือน">
    ${grid}${bars}${ax}
    <rect class="hit" id="vhit" x="${padl}" y="${padt}" width="${W-padl-padr}" height="${ih}" fill="transparent"/></svg>
    <div class="tip" id="voltip"></div></div>
    <p style="font-size:12.5px;color:var(--faint);margin:6px 0 0">รวม ${fmt(tot)} รีวิวที่ระบุเดือนได้ · แท่งสูง = เดือนที่มีรีวิวเยอะ</p>`;
}
function initVol(){
  const svg=document.getElementById('volsvg'); if(!svg||!CURTREND) return;
  const trend=CURTREND, n=trend.length;
  const tip=document.getElementById('voltip'), wrap=document.getElementById('vw');
  const bars=svg.querySelectorAll('.vbar');
  function move(e){
    const r=svg.getBoundingClientRect();
    const sx=(e.clientX-r.left)*(TG.W/r.width);
    let i=Math.round((sx-TG.padl)/((TG.W-TG.padl-TG.padr))*(n-1));
    i=Math.max(0,Math.min(n-1,i)); const p=trend[i];
    bars.forEach((b,j)=>b.style.opacity=(j===i?1:.3));
    const px=tgX(i,n), by=parseFloat(bars[i].getAttribute('y'));
    tip.innerHTML=`${p.ym} · <b>${fmt(p.n)}</b> รีวิว`;
    tip.style.left=(px/TG.W*r.width)+'px';
    tip.style.top=(by/VH*r.height)+'px';
    tip.style.opacity=1;
  }
  function leave(){tip.style.opacity=0;bars.forEach(b=>b.style.opacity=1);}
  wrap.addEventListener('mousemove',move);
  wrap.addEventListener('mouseleave',leave);
}

/* ---------- views ---------- */
function hotelView(h, plat){
  plat = plat || 'all';
  if (plat !== 'all' && !h.breakdown[plat]) plat = 'all';
  const M = (plat === 'all') ? h : h.breakdown[plat];

  const plats=Object.entries(h.platforms);
  let platHtml='';
  plats.forEach(([nm,p])=>{const v=p.avg||0;
    platHtml+=`<div class="plat"><span class="nm">${nm}</span>
      <div class="track"><div class="fill" style="width:${v/10*100}%"></div></div>
      <span class="v">${v?v.toFixed(2):'–'} <small>· ${fmt(p.n)}</small></span></div>`;});

  const tabKeys=['all', ...Object.keys(h.breakdown)];
  let tabs='';
  tabKeys.forEach(k=>{const on=(k===plat); const cnt=(k==='all')?h.n:h.breakdown[k].n;
    tabs+=`<button class="ptab${on?' active':''}" onclick="showPlat('${k}')">${k==='all'?'ทั้งหมด':k} <small>${fmt(cnt)}</small></button>`;});

  const str=strengthOf(M);
  CURTREND = M.trend;
  const avgTxt = M.avg!=null ? M.avg.toFixed(2) : '–';
  const ctx = (plat==='all')
    ? `รวมทุกแพลตฟอร์ม · ${fmt(M.n)} รีวิว · เฉลี่ย ${avgTxt}/10`
    : `เฉพาะ <b>${plat}</b> · ${fmt(M.n)} รีวิว · เฉลี่ย ${avgTxt}/10`;

  return `<div class="view">
    <p class="eyebrow">โรงแรมในเครือ At Mind Group</p>
    <h1 class="title">${h.name}</h1>
    <div class="loc">${loc(h.name)}</div>

    <section class="sec"><div class="grid card hero">
      <div class="scorebox">
        <div class="big">${h.avg.toFixed(2)}<small>/10</small></div>
        <div class="verdict">${verdict(h.avg)}</div>
        <div class="nrev">${fmt(h.n)} รีวิว · ${plats.length} แพลตฟอร์ม</div>
      </div>
      <div class="platrow">${platHtml}</div>
    </div></section>

    <div class="ptabs-wrap" id="ptabs">
      <div class="ptabs-h">เลือกดูตามแพลตฟอร์มที่รีวิว</div>
      <div class="ptabs">${tabs}</div>
      <div class="ptabs-ctx">กำลังดู: ${ctx}</div>
    </div>

    <section class="sec"><div class="sec-h"><span class="num">01</span><h2>การกระจายคะแนน</h2>
      <span class="hint">สัดส่วนรีวิวตามระดับความพอใจ</span></div>
      <div class="card">${distBar(M.dist)}</div></section>

    <section class="sec"><div class="sec-h"><span class="num">02</span><h2>แนวโน้มคะแนนตามเวลา</h2>
      <span class="hint">คะแนนเฉลี่ยรายเดือน</span></div>
      <div class="card">${trendChart(M.trend)}
      <div class="subchart"><div class="subchart-h">จำนวนรีวิวต่อเดือน</div>${volumeChart(M.trend)}</div>
      </div></section>

    <section class="sec"><div class="sec-h"><span class="num">03</span><h2>จุดแข็ง & จุดอ่อน</h2>
      <span class="hint">หัวข้อที่ลูกค้าพูดถึง — ชม vs บ่น</span></div>
      <div class="card">${topicsBars(M.topics)}
      <p style="font-size:13px;color:var(--muted);margin:16px 0 0;border-top:1px solid var(--line-2);padding-top:12px">
      <b style="color:var(--pos)">จุดแข็งเด่นสุด:</b> ${str?str.topic:'–'} ${str?`(ชม ${fmt(str.pos)} · บ่นเพียง ${Math.round(str.neg_rate*100)}%)`:''}</p>
      </div></section>

    <section class="sec"><div class="sec-h"><span class="num">04</span><h2>ข้อเสนอแนะเพื่อพัฒนา</h2>
      <span class="hint">ข้อดี / ข้อเสีย รายหัวข้อ · เรียงตามจำนวนคำบ่น</span></div>
      ${topicBreakdown(M)}</section>
  </div>`;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function topicBreakdown(h){
  const prio = new Set(h.recs.map(r=>r.topic));
  const list = h.topics.slice().sort((a,b)=>b.neg-a.neg).slice(0,8);
  let html='';
  list.forEach(t=>{
    const pct=Math.round(t.neg_rate*100);
    const pq=t.pos_sample
      ?`<blockquote>“${esc(t.pos_sample)}”</blockquote>`
      :'<span class="muted">—</span>';
    const nq=t.neg_sample
      ?`<blockquote>“${esc(t.neg_sample)}”</blockquote>`
      :'<span class="muted">ไม่พบคำบ่นที่ชัดเจน</span>';
    const badge=prio.has(t.topic)?'<span class="prio">ควรแก้ก่อน</span>':'';
    html+=`<div class="tb"><div class="tb-h"><h3>${t.topic}</h3>${badge}
      <div class="tb-badges"><span class="b p">ชม ${fmt(t.pos)}</span>
      <span class="b n">บ่น ${fmt(t.neg)} · ${pct}%</span></div></div>
      <div class="tb-cols">
        <div class="tb-col pos"><h4>✓ ข้อดี</h4>${pq}</div>
        <div class="tb-col neg"><h4>✗ ข้อเสีย</h4>${nq}</div></div>
      <div class="tb-rec"><b>คำแนะนำ:</b> ${recReason(t,pct)}</div></div>`;
  });
  return html;
}

function recReason(r,pct){
  const t=r.topic;
  const map={
    'ความสะอาด':'ความสะอาดเป็นปัจจัยพื้นฐานที่กระทบความพอใจมากสุด ควรเข้มงวด checklist แม่บ้าน เปลี่ยนผ้าปู/ผ้าเช็ดตัวทุกครั้ง และสุ่มตรวจห้องก่อนรับเข้าพัก',
    'พนักงาน/บริการ':'บริการหน้าด่านกำหนดความประทับใจแรก ควรเทรนเรื่องความเร็ว มารยาท และการแก้ปัญหาเฉพาะหน้า รวมถึงดูแลช่วงพีคให้พอกับจำนวนแขก',
    'ทำเล':'ทำเลแก้ไม่ได้ แต่ลดแรงเสียดทานได้ — ให้ข้อมูลการเดินทาง จัดรถรับส่ง/ชัทเทิล และระบุระยะทางจริงในหน้าจองให้ชัด',
    'ห้องพัก':'ห้องคือสินค้าหลัก ควรตรวจสภาพเฟอร์นิเจอร์/เตียง จัดการห้องที่ลูกค้าบ่นเรื่องขนาดหรือสภาพ และพิจารณา renovate ห้องเก่า',
    'อาหาร/อาหารเช้า':'อาหารเช้าเป็นจุดที่รีวิวจับตา ควรเพิ่มความหลากหลาย คุมคุณภาพ/ความสด และดูแลช่วงคนเยอะให้ของไม่ขาด',
    'ความคุ้มค่า/ราคา':'มุมมองความคุ้มค่าสะท้อนช่องว่างราคา-คุณภาพ ทบทวน pricing เทียบคู่แข่ง และเพิ่ม value (สิทธิประโยชน์/ของแถม) แทนการลดราคาตรง',
    'สิ่งอำนวยความสะดวก':'สิ่งอำนวยความสะดวก (สระ/ฟิตเนส/ลิฟต์/ที่จอดรถ/wifi) ควรตรวจการใช้งานสม่ำเสมอ และสื่อสารเวลาเปิด-ปิด/ข้อจำกัดให้ชัด',
    'เสียงรบกวน':'เสียงรบกวนแก้ได้ด้วยการปรับห้องติดถนน/ลิฟต์ เพิ่ม soundproof และจัดห้องเงียบให้แขกที่ต้องการพักผ่อน',
    'ความสบาย/แอร์/น้ำ':'ปัญหาแอร์ไม่เย็น/น้ำไม่อุ่น/ฝักบัวกระทบการพักผ่อนโดยตรง ควรมีรอบ PM ตรวจระบบแอร์และน้ำอุ่นทุกห้อง',
    'เช็คอิน/รอคิว':'การรอเช็คอินนานคือความประทับใจแรกที่เสีย ควรเพิ่มจุดบริการช่วงพีค ทำ pre-check-in หรือ self-service kiosk',
  };
  return map[t]||`มีคำบ่นเรื่อง ${t} ราว ${pct}% ของที่กล่าวถึงหัวข้อนี้ ควรตั้งเป็นวาระปรับปรุง`;
}

function compareView(){
  const maxN=Math.max(...H.map(h=>h.n));
  let rank='';
  H.forEach((h,i)=>{
    rank+=`<div class="rankrow" onclick="show(${DATA.hotels.indexOf(h)})" tabindex="0" role="button">
      <span class="pos">${i+1}</span>
      <div class="hn">${shortName(h.name)}<small>${loc(h.name)}</small></div>
      <div class="track"><div class="fill" style="width:${h.avg/10*100}%"></div></div>
      <div class="sc">${h.avg.toFixed(2)}<small>${fmt(h.n)} รีวิว</small></div></div>`;
  });

  let rows='';
  H.forEach(h=>{const s=strengthOf(h),w=weaknessOf(h);
    rows+=`<tr><td class="hname" onclick="show(${DATA.hotels.indexOf(h)})">${shortName(h.name)}</td>
      <td><span class="scn">${h.avg.toFixed(2)}</span></td>
      <td>${fmt(h.n)}</td>
      <td><span class="tag up">${s?s.topic:'–'}</span></td>
      <td><span class="tag down">${w?w.topic:'–'}</span></td></tr>`;});

  // group-wide topic tally
  const agg={};
  DATA.hotels.forEach(h=>h.topics.forEach(t=>{agg[t.topic]=agg[t.topic]||{pos:0,neg:0};
    agg[t.topic].pos+=t.pos;agg[t.topic].neg+=t.neg;}));
  const aggArr=Object.entries(agg).map(([topic,v])=>({topic,...v,total:v.pos+v.neg}))
    .sort((a,b)=>b.total-a.total);

  const groupAvg=(DATA.hotels.reduce((s,h)=>s+h.avg*h.n,0)/DATA.hotels.reduce((s,h)=>s+h.n,0));
  const totN=DATA.hotels.reduce((s,h)=>s+h.n,0);

  return `<div class="view">
    <p class="eyebrow">ภาพรวมทั้งเครือ · ${DATA.hotels.length} โรงแรม</p>
    <h1 class="title">เปรียบเทียบทุกโรงแรม</h1>
    <div class="loc">รวม ${fmt(totN)} รีวิว · คะแนนเฉลี่ยทั้งเครือ ${groupAvg.toFixed(2)}/10</div>

    <section class="sec"><div class="sec-h"><span class="num">01</span><h2>อันดับคะแนนเฉลี่ย</h2>
      <span class="hint">คลิกเพื่อดูรายโรงแรม</span></div>
      <div class="card"><div class="rank">${rank}</div></div></section>

    <section class="sec"><div class="sec-h"><span class="num">02</span><h2>สรุปจุดแข็ง / จุดอ่อน</h2></div>
      <div class="card"><table class="cmp">
        <thead><tr><th>โรงแรม</th><th>คะแนน</th><th>รีวิว</th><th>จุดแข็ง</th><th>ควรปรับปรุงก่อน</th></tr></thead>
        <tbody>${rows}</tbody></table></div></section>

    <section class="sec"><div class="sec-h"><span class="num">03</span><h2>หัวข้อที่ลูกค้าพูดถึงมากสุด — ทั้งเครือ</h2>
      <span class="hint">ชม vs บ่น รวมทุกโรงแรม</span></div>
      <div class="card">${topicsBars(aggArr)}</div></section>

    <section class="sec"><div class="sec-h"><span class="num">04</span><h2>หมายเหตุข้อมูล & วิธีวิเคราะห์</h2></div>
      <div class="card note">
        <p><b>แหล่งข้อมูล:</b> รีวิวจาก 4 แพลตฟอร์ม — Agoda, Booking.com, Trip.com, Expedia ดึงตรงจากแต่ละเจ้า</p>
        <p><b>การกันนับซ้ำ:</b> Agoda แสดงรีวิวจาก partner (Booking.com) ปนในหน้าตัวเอง จึง<b>ตัดออก 6,595 รีวิว</b> เก็บเฉพาะรีวิว Agoda แท้ เพื่อไม่ให้นับซ้ำกับข้อมูล Booking ที่ดึงตรงอยู่แล้ว — กันคะแนน/หัวข้อ bias</p>
        <p><b>คะแนน:</b> ทุกแพลตฟอร์มใช้สเกล 0–10 · รีวิวที่ไม่มีคะแนนยังนับในจำนวนรวม แต่ไม่เข้าค่าเฉลี่ย/การกระจาย/แนวโน้ม</p>
        <p><b>จุดแข็ง/จุดอ่อน:</b> จับหัวข้อด้วย keyword (ไทย+อังกฤษ) แล้วแยกบวก/ลบจากช่อง positive/negative (Booking, Expedia) และจากคะแนนของรีวิวข้อความ (≥8 = บวก, ≤6 = ลบ)</p>
        <p><b>แนวโน้ม:</b> เส้นแสดงเฉพาะเดือนที่มี ≥3 รีวิว (กรองเฉพาะการแสดงผล ไม่ตัดข้อมูล)</p>
      </div></section>
  </div>`;
}

/* ---------- nav ---------- */
function buildNav(){
  let html='';
  H.forEach(h=>{const idx=DATA.hotels.indexOf(h);
    html+=`<button class="navbtn" id="nav-${idx}" onclick="show(${idx})">
      <span>${shortName(h.name)}</span><span class="sc">${h.avg.toFixed(2)}</span></button>`;});
  document.getElementById('nav-hotels').innerHTML=html;
  const tot=DATA.hotels.reduce((s,h)=>s+h.n,0);
  document.getElementById('foot').innerHTML=`${fmt(tot)} reviews analyzed<br>Agoda · Booking · Trip.com · Expedia<br>generated 2026-06`;
}
function show(idx){
  document.querySelectorAll('.navbtn').forEach(b=>b.classList.remove('active'));
  document.getElementById(idx<0?'nav-compare':'nav-'+idx).classList.add('active');
  CURTREND=null; CURHOTEL=idx; CURPLAT='all';
  document.getElementById('main').innerHTML = idx<0?compareView():hotelView(DATA.hotels[idx],'all');
  initTrend(); initVol();
  window.scrollTo(0,0);
}
function showPlat(plat){
  CURPLAT=plat; CURTREND=null;
  document.getElementById('main').innerHTML = hotelView(DATA.hotels[CURHOTEL], plat);
  initTrend(); initVol();
  const t=document.getElementById('ptabs'); if(t) t.scrollIntoView({block:'start'});
}
buildNav();
show(-1);
</script>
